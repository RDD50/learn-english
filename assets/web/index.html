<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<title>Learn English</title>
<style>
:root{--bg:#f4f4f0;--s:#fff;--b:#e8e8e4;--t:#1a1a1a;--m:#777;--f:#f0f0ec;--a:#1a1a1a;--g:#4caf50;--bl:#3b6fd4;--or:#e07b39;--red:#c62828}
.dk{--bg:#111;--s:#1c1c1f;--b:#2a2a2e;--t:#f0f0ed;--m:#999;--f:#222226;--a:#f0f0ed}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t);font-family:Arial,Helvetica,sans-serif}
h1,h2,h3{font-family:Georgia,serif}
button{cursor:pointer;font-family:Arial,Helvetica,sans-serif}
button:disabled{opacity:.45;cursor:not-allowed}
input,textarea,select{width:100%;background:var(--f);color:var(--t);border:1px solid var(--b);border-radius:9px;padding:10px 14px;font-size:14px;outline:none}
textarea{resize:vertical}
.card{background:var(--s);border:1px solid var(--b);border-radius:16px;padding:18px}
.bp{background:var(--a);color:var(--bg);border:none;border-radius:9px;padding:11px 16px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.bg{background:var(--f);color:var(--m);border:1px solid var(--b);border-radius:9px;padding:11px 16px;font-size:13px;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.bs{background:#f0faf0;color:#2e7d32;border:1px solid #c8e6c9;border-radius:9px;padding:11px 16px;font-size:13px}
.bd{background:#fff5f5;color:#c62828;border:1px solid #fcd0d0;border-radius:9px;padding:11px 16px;font-size:13px}
.pbar{height:5px;background:var(--f);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .4s}
.tab-bar{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:18px}
.tab-bar::-webkit-scrollbar{display:none}
.tbtn{padding:7px 12px;border:1px solid var(--b);border-radius:8px;font-size:11.5px;white-space:nowrap;flex-shrink:0;background:var(--s);color:var(--m)}
.tbtn.on{background:var(--a);color:var(--bg);border-color:var(--a)}
.opt{padding:13px 16px;border-radius:9px;text-align:left;font-size:14px;border:1px solid var(--b);background:var(--f);color:var(--t);width:100%;display:block;margin-bottom:9px}
.opt.ok{background:#f0faf0!important;border-color:#4caf50!important;color:#2e7d32!important}
.opt.no{background:#fff5f5!important;border-color:#f44336!important;color:#c62828!important}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--s);border-top:1px solid var(--b);display:flex;z-index:100}
.nit{flex:1;padding:10px 4px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;font-size:9px;color:var(--m)}
.nit.on{color:var(--a)}
#app{max-width:480px;margin:0 auto;padding:24px 16px 82px}
.xpa{position:fixed;top:80px;right:20px;font-size:17px;font-weight:700;color:var(--g);z-index:300;pointer-events:none;animation:fadeup 1.4s ease forwards}
@keyframes fadeup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--s);border-radius:20px;padding:24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.ob{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.sec{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--m);margin-bottom:12px}
.lbl{font-size:11px;color:var(--m);display:block;margin-bottom:5px}
.small{font-size:13px;color:var(--m);line-height:1.6}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.article-text{font-size:15px;line-height:1.9;background:var(--f);border:1px solid var(--b);border-radius:14px;padding:18px}
.line{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start}
.role{font-size:11px;color:var(--m);min-width:82px}
</style>
</head>

function sv(k){
  const m={xp:'xp',streak:'streak',lastStudy:'ls',dailyP:'dp',dailyG:'dg',dailyD:'dd',userLvl:'ulvl',obDone:'ob',decks:'decks',srs:'srs',badges:'bdg',phrases:'phr',errLog:'erl',readS:'rs',dk:'dk',customDecks:'customDecks',customCount:'customCount',customDir:'customDir'};
  if(m[k])LS.set(m[k],S[k]);
}
function getLvl(xp){let l=LVLS[0];for(const t of LVLS){if(xp>=t.min)l=t}return l}
function srsNext(c,ok){const now=Date.now(),i=c.srsInterval||1,e=c.srsEase||2.5;if(!ok)return{srsInterval:1,srsEase:Math.max(1.3,e-.2),srsNextReview:now+60000};const ni=Math.round(i*e);return{srsInterval:ni,srsEase:Math.min(3,e+.1),srsNextReview:now+ni*86400000}}
function addXP(n){S.xp+=n;sv('xp');checkB();const el=document.createElement('div');el.className='xpa';el.textContent=`+${n} XP`;document.getElementById('xpt').innerHTML='';document.getElementById('xpt').appendChild(el);setTimeout(()=>el.remove(),1500)}
function toast(msg,c='#4caf50'){const el=document.createElement('div');el.className='xpa';el.style.color=c;el.textContent=msg;document.getElementById('xpt').appendChild(el);setTimeout(()=>el.remove(),2300)}
function earnB(id){if(S.badges.includes(id))return;S.badges.push(id);sv('badges')}
function checkB(){if(S.xp>=100)earnB('b3');if(S.xp>=500)earnB('b4');if(S.streak>=3)earnB('b2')}
function updStreak(){const t=today();if(S.lastStudy===t)return;const y=new Date(Date.now()-86400000).toDateString();S.streak=S.lastStudy===y?S.streak+1:1;S.lastStudy=t;sv('streak');sv('lastStudy')}
function incD(){S.dailyP++;sv('dailyP');if(S.dailyP===S.dailyG)toast('Objectif atteint')}
function logErr(w,ok){S.errLog.push({t:Date.now(),w,ok});if(S.errLog.length>300)S.errLog=S.errLog.slice(-300);sv('errLog')}

function cardDirection(c){return c._dir||'enfr'}
function cardFrontLang(c){return cardDirection(c)==='fren'?'Français':'Anglais'}
function cardBackLang(c){return cardDirection(c)==='fren'?'Anglais':'Français'}
function cardFrontText(c){return cardDirection(c)==='fren'?c.tr:c.word}
function cardBackText(c){return cardDirection(c)==='fren'?c.word:c.tr}
function applyCardDirection(c,dir){let finalDir=dir;if(dir==='mix')finalDir=Math.random()<0.5?'enfr':'fren';return{...c,_dir:finalDir}}

function render(){
  if(S.dk)document.body.classList.add('dk');else document.body.classList.remove('dk');
  if(!S.obDone){renderOb();return}
  document.getElementById('ob').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('bnav').style.display='flex';
  renderNav();
  const fns={home:rHome,decks:rDecks,learn:rLearn,content:rContent,exams:rExams};
  document.getElementById('app').innerHTML=rHeader()+'<div id="tc">'+(fns[S.tab]||rHome)()+'</div>';
}

function rHeader(){
  const lv=getLvl(S.xp),nx=LVLS.find(t=>t.min>S.xp),p=nx?Math.min(100,((S.xp-lv.min)/(nx.min-lv.min))*100):100;
  return`
  <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px">
    <div><div class="sec" style="margin:0 0 3px">Application</div><h1 style="font-size:26px;line-height:1.1">Learn English</h1></div>
    <button class="bg" onclick="toggleDk()" style="padding:8px 10px;font-size:16px">${S.dk?'☀️':'🌙'}</button>
  </div>
  <div style="display:flex;gap:10px;margin-bottom:20px">
    <div class="card" style="display:flex;align-items:center;gap:8px;padding:12px 14px;min-width:88px">
      <span style="font-size:22px">🔥</span><div><div style="font-family:Georgia,serif;font-size:22px;font-weight:700;line-height:1">${S.streak}</div><div style="font-size:10px;color:var(--m)">streak</div></div>
    </div>
    <div class="card" style="flex:1">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:12px;font-weight:600;color:${lv.c}">${S.userLvl||lv.l} · ${lv.label}</span>
        <span style="font-size:11px;color:var(--m)">${S.xp} XP</span>
      </div>
      <div class="pbar"><div class="pfill" style="width:${p}%;background:${lv.c}"></div></div>
      ${nx?`<div style="font-size:10px;color:var(--m);margin-top:4px">${nx.min-S.xp} XP → ${nx.l}</div>`:''}
    </div>
  </div>`;
}

function renderNav(){
  const tabs=[{id:'home',i:'🏠',l:'Accueil'},{id:'decks',i:'📚',l:'Decks'},{id:'learn',i:'✏️',l:'Apprendre'},{id:'content',i:'🌍',l:'Contenu'},{id:'exams',i:'🎓',l:'Examens'}];
  document.getElementById('bnav').innerHTML=tabs.map(t=>`<button class="nit ${S.tab===t.id?'on':''}" onclick="setTab('${t.id}')"><span style="font-size:18px">${t.i}</span><span>${t.l}</span></button>`).join('');
}

function rHome(){
  const allCards=S.decks.flatMap(d=>d.cards);
  const mastered=Object.values(S.srs).filter(x=>x.srsInterval>=7).length;
  const due=allCards.filter(c=>{const s=S.srs[c.id];return !s?.srsNextReview||s.srsNextReview<=Date.now()}).length;
  const pct=S.dailyG?Math.min(100,(S.dailyP/S.dailyG)*100):0;
  const errs=S.errLog.filter(e=>!e.ok).map(e=>e.w),wc={};errs.forEach(w=>wc[w]=(wc[w]||0)+1);
  const top=Object.entries(wc).sort((a,b)=>b[1]-a[1]).slice(0,5);
  return`
  <div class="card" style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-weight:600;font-size:15px">Objectif du jour</div><span style="font-size:13px;color:${S.dailyP>=S.dailyG?'var(--g)':'var(--m)'};font-weight:600">${S.dailyP}/${S.dailyG}</span></div>
    <div class="pbar"><div class="pfill" style="width:${pct}%;background:${S.dailyP>=S.dailyG?'var(--g)':'var(--bl)'}"></div></div>
  </div>
  <div class="grid2" style="margin-bottom:14px">
    <button class="bp" onclick="startDaily()" style="padding:14px;flex-direction:column"><span style="font-size:20px">🔁</span><span style="font-size:12px">Révision SRS (${due})</span></button>
    <button class="bg" onclick="S.tab='learn';S.learnSub='custom';render()" style="padding:14px;flex-direction:column"><span style="font-size:20px">🔀</span><span style="font-size:12px">Personnaliser</span></button>
  </div>
  <div class="grid3" style="margin-bottom:14px">
    ${[['⚡',S.xp,'XP'],['✅',mastered,'Maîtrisées'],['🕐',due,'À revoir']].map(([i,v,l])=>`<div class="card" style="text-align:center;padding:14px 8px"><div style="font-size:20px;margin-bottom:4px">${i}</div><div style="font-family:Georgia,serif;font-size:24px;font-weight:700">${v}</div><div style="font-size:10px;color:var(--m)">${l}</div></div>`).join('')}
  </div>
  <div class="card" style="margin-bottom:14px">
    <h3 style="font-size:14px;margin-bottom:12px">Analyse des erreurs</h3>
    ${top.length?`<div style="display:flex;flex-wrap:wrap;gap:6px">${top.map(([w,c])=>`<span style="padding:4px 10px;background:${c>=3?'#fff5f5':'#fff9e6'};color:${c>=3?'#c62828':'#e65100'};border-radius:20px;font-size:12px;font-weight:500">${esc(w)} ×${c}</span>`).join('')}</div>`:'<div class="small">Aucune erreur récente.</div>'}
  </div>
  <div class="card">
    <h3 style="font-size:14px;margin-bottom:14px">Badges ${S.badges.length}/${BADGES.length}</h3>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">${BADGES.map(b=>`<div style="text-align:center;padding:10px 4px;border-radius:9px;background:${S.badges.includes(b.id)?'var(--f)':'transparent'};opacity:${S.badges.includes(b.id)?1:.25}"><div style="font-size:24px">${b.i}</div><div style="font-size:10px;color:var(--m);margin-top:4px">${b.n}</div></div>`).join('')}</div>
  </div>`;
}

              <span style="font-size:12px;color:#555">${dk.cards.length} cartes</span>

      </div>

        <div style="display:flex;justify-content:space-between;margin-bottom:10px;gap:8px">
          <span style="font-size:12px;color:var(--m)">${m}/${dk.cards.length} maîtrisées</span>
          <div style="display:flex;gap:7px"><button class="bp" onclick="showM('acard','${dk.id}')" style="padding:6px 11px;font-size:11px">+ Carte</button><button class="bd" onclick="delDk('${dk.id}')" style="padding:6px 10px;font-size:11px">Supprimer</button></div>
        </div>
        <div style="max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:7px">
          ${dk.cards.map(c=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:var(--f);border-radius:8px;gap:8px"><div style="min-width:0"><span style="font-family:Georgia,serif;font-size:14px;font-weight:700">${esc(c.word)}</span><span style="font-size:12px;color:var(--m);margin-left:8px">${esc(c.tr)}</span></div><button onclick="delC('${dk.id}','${c.id}')" style="background:none;border:none;color:var(--m);font-size:14px;padding:2px 4px">✕</button></div>`).join('')}

function rStudy(){
  const dk=S.studyDeck,idx=S.studyIdx||0,card=dk.cards[idx];
  if(!card){earnB('b5');sv('srs');return`<div style="text-align:center;padding:36px 0"><div style="font-size:48px;margin-bottom:10px">🏆</div><h2 style="margin-bottom:8px">Session terminée</h2><p class="small" style="margin-bottom:18px">Les cartes ont été enregistrées dans le système SRS.</p><button class="bp" onclick="endStudy()">Retour</button></div>`}
  const md=S.studyMode||'flip',total=dk.cards.length,prog=Math.round((idx/total)*100);
  const frontLang=cardFrontLang(card),backLang=cardBackLang(card),front=cardFrontText(card),back=cardBackText(card);
  let cnt='';
  if(md==='flip'){
    const fl=S.flipped;
    cnt=`<div onclick="doFlip()" style="min-height:190px;background:${fl?'var(--a)':'var(--f)'};border:1px solid var(--b);border-radius:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;transition:all .3s;color:${fl?'var(--bg)':'var(--t)'}">
      ${!fl?`<div style="text-align:center"><div class="sec">${frontLang}</div><div style="font-family:Georgia,serif;font-size:40px;font-weight:700">${esc(front)}</div><div style="font-size:12px;color:var(--m);margin-top:10px">Cliquer pour révéler</div>${card.deckName?`<div style="font-size:11px;color:var(--m);margin-top:8px">${esc(card.deckName)}</div>`:''}</div>`:`<div style="text-align:center"><div class="sec" style="color:var(--m)">${backLang}</div><div style="font-family:Georgia,serif;font-size:28px;font-weight:700;margin-bottom:14px">${esc(back)}</div>${card.ex?`<div style="font-size:13px;font-style:italic;color:#aaa;border-top:1px solid #333;padding-top:12px">"${esc(card.ex)}"</div>`:''}</div>`}
    </div>
    <div style="display:flex;gap:8px;margin:12px 0"><button class="bg" onclick="tts('${esc(front)}')" style="flex:1">🔊 Écouter</button><button class="bg" onclick="doSpeech()" style="flex:1">🎤 Répéter</button></div>
    <div id="spkr"></div>
    ${fl?`<div style="display:flex;gap:9px;margin-top:6px"><button class="bd" onclick="ans(false)" style="flex:1">À revoir</button><button class="bs" onclick="ans(true)" style="flex:1">Je savais</button></div>`:`<button class="bp" onclick="doFlip()" style="width:100%">Retourner</button>`}`;
  }else if(md==='qcm'){
    const opts=S.qopts||genQCM(card);if(!S.qopts)S.qopts=opts;
    cnt=`<div class="card" style="text-align:center;margin-bottom:14px"><div class="sec">Trouve la traduction</div><div style="font-size:12px;color:var(--m);margin-bottom:8px">${frontLang} → ${backLang}</div><div style="font-family:Georgia,serif;font-size:36px;font-weight:700">${esc(front)}</div><button class="bg" onclick="tts('${esc(front)}')" style="margin-top:10px">🔊</button></div><div id="qopts">${opts.map(o=>`<button class="opt" onclick="ansQ('${esc(o)}')">${esc(o)}</button>`).join('')}</div>`;
  }else{
    cnt=`<div class="card" style="margin-bottom:14px"><div class="sec">Traduis en ${backLang.toLowerCase()}</div><div style="font-family:Georgia,serif;font-size:36px;font-weight:700;margin-bottom:8px">${esc(front)}</div>${card.ex?`<div style="font-size:13px;color:var(--m);font-style:italic">"${esc(card.ex)}"</div>`:''}</div><input id="finp" placeholder="Tape la réponse..." onkeydown="if(event.key==='Enter')chkFill()"><div id="fr" style="margin-top:10px"></div><button class="bp" onclick="chkFill()" style="width:100%;margin-top:10px" id="fbtn">Vérifier</button>`;
  }
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:8px"><button class="bg" onclick="endStudy()" style="padding:7px 12px;font-size:12px">← Retour</button><div style="display:flex;gap:5px">${['flip','qcm','fill'].map(m=>`<button class="${md===m?'bp':'bg'}" onclick="setSM('${m}')" style="padding:7px 10px;font-size:11px">${m==='flip'?'Carte':m==='qcm'?'QCM':'Saisie'}</button>`).join('')}</div><span style="font-size:12px;color:var(--m)">${idx+1}/${total}</span></div><div class="pbar" style="margin-bottom:16px"><div class="pfill" style="width:${prog}%;background:${dk.accent||'var(--bl)'}"></div></div>${cnt}`;
}

function genQCM(c){
  const correct=cardBackText(c),dir=cardDirection(c);
  const all=S.decks.flatMap(d=>d.cards.map(x=>applyCardDirection(x,dir)));
  const oth=all.filter(x=>x.id!==c.id&&cardBackText(x)!==correct).sort(()=>Math.random()-.5).slice(0,3).map(x=>cardBackText(x));
  while(oth.length<3)oth.push(['Je ne sais pas','Autre réponse','Réponse proche'][oth.length]||'Autre');
  return[...oth,correct].sort(()=>Math.random()-.5);
}

function rLearn(){
  if(S.studyDeck)return rStudy();
  const subs=[{id:'grammar',l:'Grammaire'},{id:'phrases',l:'Phrases'},{id:'pronun',l:'Prononciation'},{id:'idioms',l:'Idiomes'},{id:'dictation',l:'Dictée'},{id:'custom',l:'Personnaliser'}];
  const fns={grammar:rGram,phrases:rPhr,pronun:rPron,idioms:rIdioms,dictation:rDict,custom:rCustomLearn};
  return`<div class="tab-bar">${subs.map(s=>`<button class="tbtn ${S.learnSub===s.id?'on':''}" onclick="S.learnSub='${s.id}';render()">${s.l}</button>`).join('')}</div><div id="lc">${(fns[S.learnSub]||rGram)()}</div>`;
}

function rGram(){
  if(S.gqmode==='quiz')return rGQ();
  const flt=S.gqf==='all'?GRAMMAR:GRAMMAR.filter(g=>g.lvl===S.gqf);
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:8px"><div style="display:flex;gap:5px;overflow-x:auto">${['all','A1','A2','B1','B2','C1'].map(l=>`<button class="${S.gqf===l?'bp':'bg'}" onclick="S.gqf='${l}';render()" style="padding:6px 10px;font-size:11px">${l==='all'?'Tout':l}</button>`).join('')}</div><button class="bp" onclick="S.gqmode='quiz';S.gqd={idx:0,sc:0,sel:null,done:false};render()" style="padding:7px 13px;font-size:12px">Quiz</button></div>
  ${flt.map(g=>`<div style="padding:18px 20px;border:1px solid var(--b);border-radius:13px;background:var(--f);margin-bottom:12px"><div style="display:flex;justify-content:space-between;margin-bottom:8px;gap:8px"><div style="font-family:Georgia,serif;font-size:18px;font-weight:700">${esc(g.rule)}</div><span style="font-size:10px;padding:2px 8px;border-radius:20px;background:#e8eef8;color:#3b6fd4;font-weight:600">${g.lvl}</span></div><div style="font-size:12px;color:var(--m);background:var(--s);border-radius:7px;padding:6px 12px;margin-bottom:9px;font-style:italic">${esc(g.formula)}</div><div style="font-size:13px;margin-bottom:7px">"${esc(g.ex)}" <button onclick="tts('${esc(g.ex)}')" style="background:none;border:none;color:var(--m);font-size:13px">🔊</button></div><div style="font-size:12px;color:var(--m)">💡 ${esc(g.tip)}</div></div>`).join('')}`;
}

function rGQ(){
  if(!S.gqd)S.gqd={idx:0,sc:0,sel:null,done:false};
  const {idx,sc,sel,done}=S.gqd;
  if(done)return`<div style="text-align:center;padding:36px 0"><div style="font-family:Georgia,serif;font-size:44px;font-weight:700">${sc}/${GQUIZ.length}</div><div class="small" style="margin:8px 0 24px">${sc===GQUIZ.length?'Quiz parfait':'Quiz terminé'}</div><div style="display:flex;gap:10px"><button class="bp" onclick="S.gqd={idx:0,sc:0,sel:null,done:false};render()">Recommencer</button><button class="bg" onclick="S.gqmode='learn';render()">Retour</button></div></div>`;
  const q=GQUIZ[idx];
  return`<div style="display:flex;justify-content:space-between;margin-bottom:14px"><button class="bg" onclick="S.gqmode='learn';render()" style="font-size:12px">← Retour</button><span style="font-size:12px;color:var(--m)">${idx+1}/${GQUIZ.length}</span></div><div style="font-family:Georgia,serif;font-size:21px;font-weight:700;line-height:1.5;margin-bottom:18px">${esc(q.q)}</div><div>${q.opts.map((o,i)=>`<button class="opt ${sel!==null?(i===q.a?'ok':(o===sel?'no':'')):''}" onclick="ansGQ('${esc(o)}')" ${sel!==null?'disabled':''}>${esc(o)}</button>`).join('')}</div>${sel!==null?`<div style="margin-top:12px;padding:13px;background:var(--f);border-radius:9px;font-size:13px;color:var(--m);line-height:1.6">💡 ${esc(q.exp)}<button class="bp" onclick="nxtGQ()" style="display:block;margin-top:10px;width:100%">${idx+1>=GQUIZ.length?'Résultats':'Suivant'}</button></div>`:''}`;
}

function rPhr(){
  return`${PHRASES.map((p,i)=>{const done=S.phrases.includes(i);return`<div style="padding:16px 18px;border:1px solid ${done?'var(--a)':'var(--b)'};border-radius:13px;background:${done?'var(--a)':'var(--f)'};margin-bottom:10px"><div style="font-size:10px;text-transform:uppercase;color:${done?'#888':'var(--m)'};margin-bottom:7px">${esc(p.ctx)} · ${p.lvl}</div><div style="font-family:Georgia,serif;font-size:18px;font-weight:700;color:${done?'var(--bg)':'var(--t)'};margin-bottom:5px">"${esc(p.p)}" <button onclick="tts('${esc(p.p)}')" style="background:none;border:none;color:${done?'#888':'var(--m)'};font-size:13px">🔊</button></div><div style="font-size:12px;color:${done?'#888':'var(--m)'};margin-bottom:11px">→ ${esc(p.fr)}</div><button onclick="togPhr(${i})" style="padding:6px 13px;background:${done?'transparent':'var(--a)'};color:${done?'#777':'var(--bg)'};border:${done?'1px solid #555':'none'};border-radius:7px;font-size:11px">${done?'✓ Appris':'Marquer · +8 XP'}</button></div>`}).join('')}`;
}

function rPron(){

  const due=S.decks.flatMap(d=>d.cards.map(c=>({...c,deckName:d.name,deckAccent:d.accent,_dir:'enfr'}))).filter(c=>{const s=S.srs[c.id];return !s?.srsNextReview||s.srsNextReview<=Date.now()});
  if(!due.length){toast('Toutes tes cartes sont à jour.','#4caf50');return}
  S.studyDeck={id:'__rev__',name:`Révision (${due.length})`,level:'',color:'#e8eef8',accent:'#3b6fd4',cards:due};
  S.studyIdx=0;S.studyMode='flip';S.flipped=false;S.qopts=null;updStreak();earnB('b1');S.tab='decks';render();
}
function startStudy(id){const dk=S.decks.find(d=>d.id===id);if(!dk||!dk.cards.length)return;S.studyDeck={...dk,cards:shuffle(dk.cards.map(c=>({...c,deckName:dk.name,deckAccent:dk.accent,_dir:'enfr'})))};S.studyIdx=0;S.studyMode='flip';S.flipped=false;S.qopts=null;updStreak();earnB('b1');render()}
function endStudy(){S.studyDeck=null;S.studyIdx=0;sv('srs');render()}
function setSM(m){S.studyMode=m;S.flipped=false;S.qopts=null;render()}
function doFlip(){S.flipped=!S.flipped;render()}
function ans(ok){const c=S.studyDeck.cards[S.studyIdx||0];S.srs[c.id]=srsNext(S.srs[c.id]||{},ok);addXP(ok?10:3);incD();logErr(c.word,ok);earnB('b1');S.studyIdx=(S.studyIdx||0)+1;S.flipped=false;S.qopts=null;if(S.studyIdx>=S.studyDeck.cards.length)sv('srs');render()}
function ansQ(opt){const c=S.studyDeck.cards[S.studyIdx||0],correct=cardBackText(c),ok=opt===correct;document.querySelectorAll('.opt').forEach(b=>{if(b.textContent.trim()===correct)b.classList.add('ok');else if(b.textContent.trim()===opt&&!ok)b.classList.add('no');b.disabled=true});addXP(ok?12:2);logErr(c.word,ok);S.srs[c.id]=srsNext(S.srs[c.id]||{},ok);incD();setTimeout(()=>{S.studyIdx=(S.studyIdx||0)+1;S.qopts=null;if(S.studyIdx>=S.studyDeck.cards.length)sv('srs');render()},1000)}
function chkFill(){const inp=document.getElementById('finp');if(!inp)return;const c=S.studyDeck.cards[S.studyIdx||0],expected=cardBackText(c);const a=inp.value.trim().toLowerCase(),co=expected.toLowerCase();const ok=a===co||co.includes(a)||a.includes(co.split('/')[0].trim().toLowerCase());inp.style.borderColor=ok?'#4caf50':'#f44336';inp.disabled=true;const res=document.getElementById('fr');if(res)res.innerHTML=`<div style="padding:12px;background:${ok?'#f0faf0':'#fff5f5'};border-radius:9px;font-size:14px;color:${ok?'#2e7d32':'#c62828'}">${ok?'Correct · +15 XP':`C'était : "${esc(expected)}"`}<button class="bp" onclick="S.studyIdx=(S.studyIdx||0)+1;S.qopts=null;render()" style="display:block;margin-top:10px;width:100%">Suivant</button></div>`;if(ok)addXP(15);else addXP(2);S.srs[c.id]=srsNext(S.srs[c.id]||{},ok);incD();const fb=document.getElementById('fbtn');if(fb)fb.style.display='none'}

function ansGQ(opt){const q=GQUIZ[S.gqd.idx];S.gqd.sel=opt;const ok=q.opts[q.a]===opt;if(ok)S.gqd.sc++;addXP(ok?15:3);logErr(q.q,ok);render()}
function nxtGQ(){const d=S.gqd;if(d.idx+1>=GQUIZ.length){d.done=true;if(d.sc===GQUIZ.length)earnB('b6')}else{d.idx++;d.sel=null}render()}
function togPhr(idx){if(S.phrases.includes(idx))S.phrases=S.phrases.filter(x=>x!==idx);else{S.phrases.push(idx);addXP(8)}sv('phrases');render()}
function chkDict(){const inp=document.getElementById('dinp');if(!inp)return;const c=DICT_WORDS[(S.dictIdx||0)%DICT_WORDS.length];const ok=inp.value.trim().toLowerCase()===c.word.toLowerCase();inp.style.borderColor=ok?'#4caf50':'#f44336';inp.disabled=true;const res=document.getElementById('dr');if(res)res.innerHTML=`<div style="padding:12px;background:${ok?'#f0faf0':'#fff5f5'};border-radius:9px;font-size:14px;color:${ok?'#2e7d32':'#c62828'};margin-top:10px">${ok?'Parfait · +15 XP':`C'était : "${esc(c.word)}" · ${esc(c.tr)}`}<button class="bp" onclick="S.dictIdx=(S.dictIdx||0)+1;render()" style="display:block;margin-top:10px;width:100%">Suivant</button></div>`;if(ok)addXP(15);else addXP(2)}

function ansTOEIC(opt){const q=TOEIC[S.toeicIdx||0];S.toeicSel=opt;const ok=q.opts[q.a]===opt;if(!S.toeicData)S.toeicData={sc:0};if(ok)S.toeicData.sc++;addXP(ok?10:2);logErr(q.q,ok);render()}
function nxtTOEIC(){const i=S.toeicIdx||0;if(i+1>=TOEIC.length){S.toeicDone=true;S.toeicScore=S.toeicData?.sc||0;earnB('b8')}else{S.toeicIdx=i+1;S.toeicSel=null}render()}
function resetTOEIC(){S.toeicIdx=0;S.toeicSel=null;S.toeicDone=false;S.toeicScore=0;S.toeicData=null;render()}
function startLT(){S.ltData={idx:0,sc:0,sel:null,done:false};render()}
function ansLT(i){const q=LTQS[S.ltData.idx];S.ltData.sel=q.opts[i];const ok=i===q.a;if(ok){S.ltData.sc++;addXP(3)}logErr(q.q,ok);render()}
function nxtLT(){const d=S.ltData;if(d.idx+1>=LTQS.length)d.done=true;else{d.idx++;d.sel=null}render()}

function doSpeech(){if(!window.SpeechRecognition&&!window.webkitSpeechRecognition){alert('Reconnaissance vocale non supportée sur cet appareil.');return}const SR=window.SpeechRecognition||window.webkitSpeechRecognition,r=new SR();r.lang='en-US';r.interimResults=false;const c=S.studyDeck?.cards[S.studyIdx||0];if(!c)return;const target=cardFrontText(c).toLowerCase();r.onresult=e=>{const said=e.results[0][0].transcript.toLowerCase(),res=document.getElementById('spkr'),ok=said.includes(target);if(res)res.innerHTML=`<div style="font-size:12px;color:${ok?'#4caf50':'var(--m)'};padding:4px 0">🎤 "${esc(said)}" ${ok?'✓':'— Réessaie'}</div>`;if(ok)addXP(5)};r.onerror=()=>{};r.start()}

function toggleCustomDeck(id){const selected=S.customDecks||[];S.customDecks=selected.includes(id)?selected.filter(x=>x!==id):[...selected,id];sv('customDecks');render()}
function selectAllCustomDecks(){S.customDecks=(S.decks||[]).filter(d=>d.cards&&d.cards.length>0).map(d=>d.id);sv('customDecks');render()}
function clearCustomDecks(){S.customDecks=[];sv('customDecks');render()}
function setCustomCount(n){S.customCount=n;sv('customCount');render()}
function setCustomDir(dir){S.customDir=dir;sv('customDir');render()}
function startDeleteMode(){S.deleteMode=true;S.deleteDecks=[];render()}
function cancelDeleteMode(){S.deleteMode=false;S.deleteDecks=[];render()}
function toggleDeleteDeck(id){const selected=S.deleteDecks||[];S.deleteDecks=selected.includes(id)?selected.filter(x=>x!==id):[...selected,id];render()}
function deleteSelectedDecks(){const ids=S.deleteDecks||[];if(!ids.length){toast('Aucun deck sélectionné.','#e07b39');return}const names=S.decks.filter(d=>ids.includes(d.id)).map(d=>d.name).join(', ');const ok=confirm(`Supprimer ${ids.length} deck(s) ?\n\n${names}\n\nLa progression SRS liée sera aussi supprimée.`);if(!ok)return;const cardIds=S.decks.filter(d=>ids.includes(d.id)).flatMap(d=>d.cards.map(c=>c.id));S.decks=S.decks.filter(d=>!ids.includes(d.id));S.customDecks=(S.customDecks||[]).filter(id=>!ids.includes(id));cardIds.forEach(cid=>delete S.srs[cid]);S.deleteMode=false;S.deleteDecks=[];sv('decks');sv('customDecks');sv('srs');toast('Decks supprimés','#c62828');render()}

function startCustomStudy(mode){
  const selected=S.customDecks||[];
  if(!selected.length){toast('Sélectionne au moins un deck.','#e07b39');return}
  let cards=S.decks.filter(d=>selected.includes(d.id)).flatMap(d=>d.cards.map(c=>({...c,deckName:d.name,deckAccent:d.accent})));
  if(!cards.length){toast('Les decks sélectionnés sont vides.','#e07b39');return}
  const count=S.customCount||10,direction=S.customDir||'enfr';
  if(mode==='srs'){
    cards=cards.filter(c=>{const s=S.srs[c.id];return !s?.srsNextReview||s.srsNextReview<=Date.now()});
    if(!cards.length){toast('Aucune carte à revoir maintenant. Lance Révisions personnalisées.','#e07b39');return}
    cards.sort((a,b)=>(S.srs[a.id]?.srsNextReview||0)-(S.srs[b.id]?.srsNextReview||0));
  }else if(mode==='review'){
    const due=[],notDue=[];
    cards.forEach(c=>{const s=S.srs[c.id];(!s?.srsNextReview||s.srsNextReview<=Date.now()?due:notDue).push(c)});
    due.sort((a,b)=>(S.srs[a.id]?.srsNextReview||0)-(S.srs[b.id]?.srsNextReview||0));
    notDue.sort((a,b)=>(S.srs[a.id]?.srsInterval||0)-(S.srs[b.id]?.srsInterval||0));
    cards=[...due,...notDue];
    if(!due.length)toast('Aucune carte due : révision douce lancée.','#3b6fd4');
  }else cards=shuffle(cards);
  cards=cards.slice(0,count).map(c=>applyCardDirection(c,direction));
  S.studyDeck={id:'__custom__',name:mode==='srs'?'Session personnalisée SRS':mode==='review'?'Révisions personnalisées':'Session personnalisée aléatoire',level:'',color:'#e8eef8',accent:mode==='srs'?'#4caf50':mode==='review'?'#e07b39':'#3b6fd4',cards};
  S.studyIdx=0;S.studyMode='flip';S.flipped=false;S.qopts=null;updStreak();earnB('b1');render();
}

function mkDeck(){const name=document.getElementById('mn')?.value?.trim();if(!name)return;S.decks.push({id:uid(),name,level:mL,color:'#e8eef8',accent:'#3b6fd4',cards:[]});sv('decks');closeM();render()}
function delDk(id){const deck=S.decks.find(d=>d.id===id);if(!deck)return;const ok=confirm(`Supprimer le deck "${deck.name}" ?\n\nCette action supprimera aussi sa progression SRS.`);if(!ok)return;const cardIds=deck.cards.map(c=>c.id);S.decks=S.decks.filter(d=>d.id!==id);S.customDecks=(S.customDecks||[]).filter(x=>x!==id);cardIds.forEach(cid=>delete S.srs[cid]);sv('decks');sv('customDecks');sv('srs');toast('Deck supprimé','#c62828');render()}
function addC(deckId){const w=document.getElementById('mw')?.value?.trim(),t=document.getElementById('mt')?.value?.trim();if(!w||!t)return;const card={id:uid(),word:w,tr:t,ex:document.getElementById('me')?.value?.trim()||''};S.decks=S.decks.map(d=>d.id===deckId?{...d,cards:[...d.cards,card]}:d);sv('decks');closeM();render()}
function delC(did,cid){S.decks=S.decks.map(d=>d.id===did?{...d,cards:d.cards.filter(c=>c.id!==cid)}:d);delete S.srs[cid];sv('decks');sv('srs');render()}
function impDeck(){const raw=document.getElementById('mit')?.value||'',name=document.getElementById('min')?.value?.trim()||'Deck importé';const cards=raw.trim().split('\n').filter(l=>l.trim()).map(line=>{const p=line.split(/[;,\t]/).map(s=>s.trim());if(p.length>=2&&p[0]&&p[1])return{id:uid(),word:p[0],tr:p[1],ex:p[2]||''};return null}).filter(Boolean);if(!cards.length){alert('Format non reconnu. Exemple : word ; traduction ; phrase exemple');return}S.decks.push({id:uid(),name,level:mL,color:'#e8eef8',accent:'#3b6fd4',cards});sv('decks');closeM();render()}

render();
</script>
