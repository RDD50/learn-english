name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install SVG converter
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin

      - name: Generate PNG launcher icon
        run: |
          mkdir -p assets/icon
          rsvg-convert assets/icon/app_icon.svg -w 1024 -h 1024 -o assets/icon/app_icon.png

      - name: Generate Flutter project files
        run: |
          flutter create . --platforms=android --project-name learn_english
          flutter pub get
          dart run flutter_launcher_icons

      - name: Set Android applicationId
        run: |
          sed -i "s/applicationId = .*/applicationId = \"com.rdd50.learnenglish\"/" android/app/build.gradle.kts

      - name: Build release APK
        run: flutter build apk --release

      - name: Prepare release file
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk release/learn-english-v1.0.1.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: learn-english-v1.0.1-apk
          path: release/learn-english-v1.0.1.apk

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="learn-english-v1.0.1-build-${{ github.run_number }}"
          gh release create "$TAG" release/learn-english-v1.0.1.apk \
            --title "Learn English v1.0.1 build ${{ github.run_number }}" \
            --notes "APK Android Learn English v1.0.1"