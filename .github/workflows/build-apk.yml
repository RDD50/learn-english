name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install SVG converter
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin

      - name: Generate PNG launcher icon
        run: |
          mkdir -p assets/icon
          rsvg-convert assets/icon/app_icon.svg -w 1024 -h 1024 -o assets/icon/app_icon.png

      - name: Generate Flutter project files
        run: |
          flutter create . --platforms=android --project-name learn_english
          flutter pub get
          dart run flutter_launcher_icons

      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/learn-english-release.jks

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=learn-english-release.jks
          EOF

      - name: Set Android applicationId
        run: |
          sed -i "s/applicationId = .*/applicationId = \"com.rdd50.learnenglish\"/" android/app/build.gradle.kts

      - name: Configure release signing
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path("android/app/build.gradle.kts")
          text = path.read_text()

          if "val keystoreProperties = java.util.Properties()" not in text:
              insert = '''import java.util.Properties
          import java.io.FileInputStream

          val keystoreProperties = Properties()
          val keystorePropertiesFile = rootProject.file("key.properties")
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(FileInputStream(keystorePropertiesFile))
          }

          '''
              text = insert + text

          old = '''    buildTypes {
                  release {
                      // TODO: Add your own signing config for the release build.
                      // Signing with the debug keys for now, so `flutter run --release` works.
                      signingConfig = signingConfigs.getByName("debug")
                  }
              }'''

          new = '''    signingConfigs {
                  create("release") {
                      keyAlias = keystoreProperties["keyAlias"] as String
                      keyPassword = keystoreProperties["keyPassword"] as String
                      storeFile = file(keystoreProperties["storeFile"] as String)
                      storePassword = keystoreProperties["storePassword"] as String
                  }
              }

              buildTypes {
                  release {
                      signingConfig = signingConfigs.getByName("release")
                  }
              }'''

          if old in text:
              text = text.replace(old, new)
          elif 'signingConfigs {' not in text:
              text = text.replace(
                  '    buildTypes {',
                  new + '\n\n    buildTypes {',
                  1
              )

          path.write_text(text)
          PY

      - name: Build signed release APK
        run: flutter build apk --release

      - name: Prepare release file
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk release/learn-english-v1.0.6.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: learn-english-v1.0.6-apk
          path: release/learn-english-v1.0.6.apk

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="learn-english-v1.0.6-build-${{ github.run_number }}"
          gh release create "$TAG" release/learn-english-v1.0.6.apk \
            --title "Learn English v1.0.6 build ${{ github.run_number }}" \
            --notes "APK Android signée Learn English v1.0.6"