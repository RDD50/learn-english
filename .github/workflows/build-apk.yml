name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Flutter project files
        run: |
          flutter create . --platforms=android --project-name learn_english
          flutter pub get

      - name: Set Android applicationId
        run: |
          sed -i "s/applicationId = .*/applicationId = \"com.rdd50.learnenglish\"/" android/app/build.gradle.kts

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: learn-english-apk
          path: build/app/outputs/flutter-apk/app-release.apk