<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Learn English</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f4f0;--s:#fff;--b:#e8e8e4;--t:#1a1a1a;--m:#999;--f:#f0f0ec;--a:#1a1a1a;--g:#4caf50;--bl:#3b6fd4;--or:#e07b39}
.dk{--bg:#111;--s:#1c1c1f;--b:#2a2a2e;--t:#f0f0ed;--m:#666;--f:#222226;--a:#f0f0ed}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;transition:background .3s}
h1,h2,h3{font-family:'Playfair Display',serif}
button{cursor:pointer;font-family:'DM Sans',sans-serif}
input,textarea{font-family:'DM Sans',sans-serif;background:var(--f);color:var(--t);border:1px solid var(--b);border-radius:9px;padding:10px 14px;font-size:14px;outline:none;width:100%}
input:focus{border-color:var(--bl)}
.card{background:var(--s);border:1px solid var(--b);border-radius:16px;padding:20px}
.bp{background:var(--a);color:var(--bg);border:none;border-radius:9px;padding:11px 18px;font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.bg{background:var(--f);color:var(--m);border:1px solid var(--b);border-radius:9px;padding:11px 18px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.bs{background:#f0faf0;color:#2e7d32;border:1px solid #c8e6c9;border-radius:9px;padding:11px 18px;font-size:13px;cursor:pointer}
.bd{background:#fff5f5;color:#c62828;border:1px solid #fcd0d0;border-radius:9px;padding:11px 18px;font-size:13px;cursor:pointer}
.pbar{height:5px;background:var(--f);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .6s}
.tab-bar{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:18px}
.tab-bar::-webkit-scrollbar{display:none}
.tbtn{padding:7px 12px;border:1px solid var(--b);border-radius:8px;font-size:11.5px;white-space:nowrap;flex-shrink:0;background:var(--s);color:var(--m)}
.tbtn.on{background:var(--a);color:var(--bg);border-color:var(--a)}
.opt{padding:13px 16px;border-radius:9px;text-align:left;font-size:14px;border:1px solid var(--b);background:var(--f);color:var(--t);width:100%;display:block;margin-bottom:9px;cursor:pointer}
.opt.ok{background:#f0faf0!important;border-color:#4caf50!important;color:#2e7d32!important}
.opt.no{background:#fff5f5!important;border-color:#f44336!important;color:#c62828!important}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--s);border-top:1px solid var(--b);display:flex;z-index:100}
.nit{flex:1;padding:10px 4px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;font-size:9px;color:var(--m);font-family:'DM Sans',sans-serif}
.nit.on{color:var(--a)}
#app{max-width:480px;margin:0 auto;padding:24px 16px 80px}
.cbai{background:var(--f);border-radius:18px 18px 18px 4px;padding:11px 15px;max-width:85%;font-size:14px;line-height:1.6}
.cbme{background:var(--a);color:var(--bg);border-radius:18px 18px 4px 18px;padding:11px 15px;max-width:85%;font-size:14px;line-height:1.6}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.dl span{width:7px;height:7px;border-radius:50%;background:var(--m);display:inline-block;animation:bounce 1s infinite}
.dl span:nth-child(2){animation-delay:.15s}.dl span:nth-child(3){animation-delay:.3s}
.xpa{animation:fu 1.4s ease forwards;position:fixed;top:80px;right:20px;font-size:18px;font-weight:700;color:var(--g);pointer-events:none;z-index:300;font-family:'Playfair Display',serif}
.story-t{font-size:15px;line-height:2.1;padding:20px;background:var(--f);border-radius:14px;border:1px solid var(--b)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--s);border-radius:20px;padding:26px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.ob{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.sec{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--m);margin-bottom:14px}
.lbl{font-size:11px;color:var(--m);letter-spacing:.05em;display:block;margin-bottom:5px}
</style>
</head>
<body>
<div id="xpt"></div>
<div id="ob" class="ob" style="display:none"></div>
<div id="app" style="display:none"></div>
<nav class="bnav" id="bnav" style="display:none"></nav>
<script>
const LS={get:(k,d)=>{try{const v=localStorage.getItem('le_'+k);return v?JSON.parse(v):d}catch{return d}},set:(k,v)=>{try{localStorage.setItem('le_'+k,JSON.stringify(v))}catch{}}};
const uid=()=>'_'+Math.random().toString(36).slice(2,9);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const tts=(t,r=.9)=>{if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=r;window.speechSynthesis.speak(u)};
const today=()=>new Date().toDateString();
const DECKS=[
  {id:'d1',name:'Débutant — Essentials',level:'A1',color:'#e8f4e8',accent:'#4caf50',cards:[
    {id:'c1',word:'Hello',tr:'Bonjour',ex:'Hello, how are you?'},
    {id:'c2',word:'Beautiful',tr:'Beau / Belle',ex:'What a beautiful day!'},
    {id:'c3',word:'Grateful',tr:'Reconnaissant',ex:'I am grateful for your help.'},
    {id:'c4',word:'Quickly',tr:'Rapidement',ex:'She spoke quickly.'},
    {id:'c5',word:'Understand',tr:'Comprendre',ex:'Do you understand?'},
    {id:'c6',word:'Friendly',tr:'Aimable',ex:'She is very friendly.'},
  ]},
  {id:'d2',name:'Intermédiaire — Nuances',level:'B2',color:'#e8eef8',accent:'#3b6fd4',cards:[
    {id:'c7',word:'Ambiguous',tr:'Ambigu',ex:'The instructions were ambiguous.'},
    {id:'c8',word:'Diligent',tr:'Diligent',ex:'She is a diligent student.'},
    {id:'c9',word:'Ephemeral',tr:'Éphémère',ex:'Fame can be ephemeral.'},
    {id:'c10',word:'Eloquent',tr:'Éloquent',ex:'He gave an eloquent speech.'},
    {id:'c11',word:'Resilient',tr:'Résilient',ex:'Children are surprisingly resilient.'},
  ]},
  {id:'d3',name:'Avancé — C1',level:'C1',color:'#f8eee8',accent:'#e07b39',cards:[
    {id:'c12',word:'Surreptitious',tr:'Furtif',ex:'A surreptitious glance.'},
    {id:'c13',word:'Perspicacious',tr:'Perspicace',ex:'A perspicacious observer.'},
    {id:'c14',word:'Obfuscate',tr:'Obscurcir',ex:'He tried to obfuscate the facts.'},
  ]},
];
const GQUIZ=[
  {q:'She ___ to Paris last year.',opts:['has gone','went','goes','go'],a:1,exp:'Simple past pour une action terminée.',lvl:'A2'},
  {q:'If I ___ rich, I would travel.',opts:['am','was','were','be'],a:2,exp:"'Were' dans les conditionnels.",lvl:'B2'},
  {q:'The report ___ by the manager.',opts:['write','wrote','was written','is write'],a:2,exp:'Passive : was + participe passé.',lvl:'B1'},
  {q:'By tomorrow, she ___ the book.',opts:['reads','will read','will have read','read'],a:2,exp:'Future perfect.',lvl:'C1'},
  {q:'He told me he ___ tired.',opts:['is','was','be','were'],a:1,exp:'Reported speech.',lvl:'B2'},
];
const PHRASES=[
  {p:'Could you say that again?',ctx:'Pas compris',fr:'Pouvez-vous répéter ?',lvl:'A1'},
  {p:'I was wondering if...',ctx:'Demande polie',fr:'Je me demandais si...',lvl:'B1'},
  {p:'To be honest with you...',ctx:'Opinion franche',fr:'Pour être honnête...',lvl:'B1'},
  {p:'It depends on...',ctx:'Nuancer',fr:'Ça dépend de...',lvl:'A2'},
  {p:'Make yourself at home.',ctx:'Accueil',fr:'Faites comme chez vous.',lvl:'A2'},
  {p:'That being said...',ctx:'Nuance',fr:'Cela dit...',lvl:'B2'},
];
const IDIOMS=[
  {e:'Break a leg',m:'Bonne chance',ex:'Break a leg on your presentation!'},
  {e:'Hit the sack',m:'Aller dormir',ex:"I'm going to hit the sack."},
  {e:'Bite the bullet',m:'Serrer les dents',ex:'Just bite the bullet and do it.'},
  {e:'Spill the beans',m:'Vendre la mèche',ex:"Don't spill the beans!"},
  {e:'Under the weather',m:'Ne pas se sentir bien',ex:"I'm a bit under the weather."},
];
const LVLS=[
  {l:'A1',min:0,label:'Débutant',c:'#4caf50'},
  {l:'A2',min:200,label:'Élémentaire',c:'#8bc34a'},
  {l:'B1',min:500,label:'Intermédiaire',c:'#3b6fd4'},
  {l:'B2',min:1100,label:'Indépendant',c:'#7c4dff'},
  {l:'C1',min:2200,label:'Avancé',c:'#e07b39'},
];
const BADGES=[
  {id:'b1',i:'🎯',n:'Premier pas'},{id:'b2',i:'🔥',n:'En feu'},
  {id:'b3',i:'⭐',n:'100 XP'},{id:'b4',i:'🌟',n:'500 XP'},
  {id:'b5',i:'📚',n:'Deck terminé'},{id:'b6',i:'🏆',n:'Quiz parfait'},
  {id:'b7',i:'📖',n:'Lecteur'},{id:'b8',i:'💬',n:'Bavard'},
];
let S={
  tab:'home',dk:LS.get('dk',false),xp:LS.get('xp',0),
  streak:LS.get('streak',0),lastStudy:LS.get('ls',null),
  dailyP:LS.get('dp',0),dailyG:LS.get('dg',10),dailyD:LS.get('dd',null),
  userLvl:LS.get('ulvl',null),obDone:LS.get('ob',false),
  decks:LS.get('decks',null),srs:LS.get('srs',{}),
  badges:LS.get('bdg',[]),phrases:LS.get('phr',[]),
  errLog:LS.get('erl',[]),hist:LS.get('hist',{}),
  report:LS.get('rep',null),readS:LS.get('rs',[]),
  studyDeck:null,studyIdx:0,studyMode:'flip',flipped:false,
  qopts:null,gqd:null,gqmode:'learn',gqf:'all',
  phf:'all',pron:0,learnSub:'grammar',
  contentSub:'stories',examSub:'toeic',
  aiMsgs:null,dlgMsgs:[],activeDlg:null,activeStory:null,
  toeicIdx:0,toeicSel:null,toeicDone:false,toeicScore:0,
  transIdx:0,transRes:null,ltData:null,dictIdx:0,obStep:0,
};
if(!S.decks)S.decks=JSON.parse(JSON.stringify(DECKS));
if(S.dailyD!==today()){S.dailyP=0;S.dailyD=today();sv('dailyP');sv('dailyD');}
function sv(k){const m={xp:'xp',streak:'streak',lastStudy:'ls',dailyP:'dp',dailyG:'dg',dailyD:'dd',userLvl:'ulvl',obDone:'ob',decks:'decks',srs:'srs',badges:'bdg',phrases:'phr',errLog:'erl',hist:'hist',report:'rep',readS:'rs',dk:'dk'};if(m[k])LS.set(m[k],S[k]);}
function getLvl(xp){let l=LVLS[0];for(const t of LVLS){if(xp>=t.min)l=t;}return l;}
function srsNext(c,ok){const now=Date.now(),i=c.srsInterval||1,e=c.srsEase||2.5;if(!ok)return{srsInterval:1,srsEase:Math.max(1.3,e-.2),srsNextReview:now+60000};const ni=Math.round(i*e);return{srsInterval:ni,srsEase:Math.min(3,e+.1),srsNextReview:now+ni*86400000};}
function addXP(n){S.xp+=n;sv('xp');checkB();const el=document.createElement('div');el.className='xpa';el.textContent=`+${n} XP ⚡`;document.getElementById('xpt').innerHTML='';document.getElementById('xpt').appendChild(el);setTimeout(()=>el.remove(),1500);}
function toast(msg,c='#4caf50'){const el=document.createElement('div');el.className='xpa';el.style.color=c;el.textContent=msg;document.getElementById('xpt').appendChild(el);setTimeout(()=>el.remove(),2500);}
function earnB(id){if(S.badges.includes(id))return;S.badges.push(id);sv('badges');}
function checkB(){if(S.xp>=100)earnB('b3');if(S.xp>=500)earnB('b4');if(S.streak>=3)earnB('b2');}
function updStreak(){const t=today();if(S.lastStudy===t)return;const y=new Date(Date.now()-86400000).toDateString();S.streak=S.lastStudy===y?S.streak+1:1;S.lastStudy=t;sv('streak');sv('lastStudy');}
function incD(){S.dailyP++;sv('dailyP');if(S.dailyP===S.dailyG)toast('🎉 Objectif atteint !','#4caf50');}
function logErr(w,ok){S.errLog.push({t:Date.now(),w,ok});if(S.errLog.length>200)S.errLog=S.errLog.slice(-200);sv('errLog');}
function render(){
  if(S.dk)document.body.classList.add('dk');else document.body.classList.remove('dk');
  if(!S.obDone){renderOb();return;}
  document.getElementById('ob').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('bnav').style.display='flex';
  renderNav();
  const fns={home:rHome,decks:rDecks,learn:rLearn,content:rContent,exams:rExams,ai:rAI};
  document.getElementById('app').innerHTML=rHeader()+'<div id="tc">'+(fns[S.tab]||rHome)()+'</div>';
}
function rHeader(){
  const lv=getLvl(S.xp),nx=LVLS.find(t=>t.min>S.xp),p=nx?Math.min(100,((S.xp-lv.min)/(nx.min-lv.min))*100):100;
  return`<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px">
    <div><div class="sec" style="margin:0 0 3px">Application</div><h1 style="font-size:26px;line-height:1.1">Learn English</h1></div>
    <button class="bg" onclick="toggleDk()" style="padding:8px 10px;font-size:16px">${S.dk?'☀️':'🌙'}</button>
  </div>
  <div style="display:flex;gap:10px;margin-bottom:20px">
    <div class="card" style="display:flex;align-items:center;gap:8px;padding:12px 14px;min-width:88px">
      <span style="font-size:22px">🔥</span>
      <div><div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;line-height:1">${S.streak}</div><div style="font-size:10px;color:var(--m)">streak</div></div>
    </div>
    <div class="card" style="flex:1">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:12px;font-weight:600;color:${lv.c}">${lv.l} · ${lv.label}</span>
        <span style="font-size:11px;color:var(--m)">${S.xp} XP</span>
      </div>
      <div class="pbar"><div class="pfill" style="width:${p}%;background:${lv.c}"></div></div>
      ${nx?`<div style="font-size:10px;color:var(--m);margin-top:4px">${nx.min-S.xp} XP → ${nx.l}</div>`:''}
    </div>
  </div>`;
}
function renderNav(){
  const tabs=[{id:'home',i:'🏠',l:'Accueil'},{id:'decks',i:'📚',l:'Decks'},{id:'learn',i:'✏️',l:'Apprendre'},{id:'content',i:'🌍',l:'Contenu'},{id:'exams',i:'🎓',l:'Examens'},{id:'ai',i:'🤖',l:'Tuteur'}];
  document.getElementById('bnav').innerHTML=tabs.map(t=>`<button class="nit ${S.tab===t.id?'on':''}" onclick="setTab('${t.id}')"><span style="font-size:18px">${t.i}</span><span>${t.l}</span></button>`).join('');
}
function rHome(){
  const mastered=Object.values(S.srs).filter(x=>x.srsInterval>=7).length;
  const due=S.decks.flatMap(d=>d.cards).filter(c=>{const s=S.srs[c.id];return!s?.srsNextReview||s.srsNextReview<=Date.now();}).length;
  const pct=S.dailyG?Math.min(100,(S.dailyP/S.dailyG)*100):0;
  const errs=S.errLog.filter(e=>!e.ok).map(e=>e.w);const wc={};errs.forEach(w=>wc[w]=(wc[w]||0)+1);
  const top=Object.entries(wc).sort((a,b)=>b[1]-a[1]).slice(0,5);
  return`
  <div class="card" style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-weight:600;font-size:15px">Objectif du jour</div><span style="font-size:13px;color:${S.dailyP>=S.dailyG?'var(--g)':'var(--m)'};font-weight:600">${S.dailyP}/${S.dailyG}</span></div>
    <div class="pbar"><div class="pfill" style="width:${pct}%;background:${S.dailyP>=S.dailyG?'var(--g)':'var(--bl)'}"></div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
    <button class="bp" onclick="startDaily()" style="padding:14px;flex-direction:column;gap:4px;border-radius:13px"><span style="font-size:20px">🔁</span><span style="font-size:12px">Révision SRS (${due})</span></button>
    <button class="bg" onclick="startBoss()" style="padding:14px;flex-direction:column;gap:4px;border-radius:13px;justify-content:center"><span style="font-size:20px">👑</span><span style="font-size:12px">Boss Round</span></button>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
    ${[['⚡',S.xp,'XP'],['✅',mastered,'Maîtrisées'],['🕐',due,'À revoir']].map(([i,v,l])=>`<div class="card" style="text-align:center;padding:14px 8px"><div style="font-size:20px;margin-bottom:4px">${i}</div><div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:700">${v}</div><div style="font-size:10px;color:var(--m)">${l}</div></div>`).join('')}
  </div>
  <div class="card" style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3 style="font-size:14px">Analyse des erreurs</h3>
      <button class="bg" onclick="setTab('ai');S.aiMsgs=null;setTimeout(()=>{setAI('Analyse mes erreurs et génère des exercices ciblés');sendAI();},300)" style="padding:6px 12px;font-size:11px">Analyser →</button>
    </div>
    ${top.length?`<div style="display:flex;flex-wrap:wrap;gap:6px">${top.map(([w,c])=>`<span style="padding:4px 10px;background:${c>=3?'#fff5f5':'#fff9e6'};color:${c>=3?'#c62828':'#e65100'};border-radius:20px;font-size:12px;font-weight:500">${esc(w)} ×${c}</span>`).join('')}</div>`:'<div style="font-size:13px;color:var(--m)">Aucune erreur récente.</div>'}
  </div>
  <div class="card" style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3 style="font-size:14px">Rapport hebdomadaire</h3>
      <button class="bp" onclick="genReport()" style="padding:7px 13px;font-size:12px" id="repbtn">Générer ✨</button>
    </div>
    <div id="repc">${S.report?`<div style="font-size:13px;line-height:1.7">${esc(S.report).replace(/\n/g,'<br>')}</div>`:'<div style="font-size:13px;color:var(--m)">Génère ton bilan personnalisé.</div>'}</div>
  </div>
  <div class="card">
    <h3 style="font-size:14px;margin-bottom:14px">Badges ${S.badges.length}/${BADGES.length}</h3>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
      ${BADGES.map(b=>`<div style="text-align:center;padding:10px 4px;border-radius:9px;background:${S.badges.includes(b.id)?'var(--f)':'transparent'};opacity:${S.badges.includes(b.id)?1:.2}"><div style="font-size:24px">${b.i}</div><div style="font-size:10px;color:var(--m);margin-top:4px">${b.n}</div></div>`).join('')}
    </div>
  </div>`;
}
function rDecks(){
  if(S.studyDeck)return rStudy();
  return`<div style="display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap">
    <button class="bp" onclick="showM('gen')" style="flex:1">✨ Générer IA</button>
    <button class="bg" onclick="showM('cdeck')" style="flex:1">+ Deck</button>
    <button class="bg" onclick="showM('imp')" style="flex:1">↑ Importer</button>
  </div>
  ${S.decks.map(dk=>{
    const due=dk.cards.filter(c=>{const s=S.srs[c.id];return!s?.srsNextReview||s.srsNextReview<=Date.now();}).length;
    const m=dk.cards.filter(c=>S.srs[c.id]?.srsInterval>=7).length;
    return`<div style="border:1px solid var(--b);border-radius:14px;overflow:hidden;margin-bottom:11px">
      <div style="padding:16px 18px;background:${dk.color};cursor:pointer" onclick="tog('db-${dk.id}')">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:5px">${esc(dk.name)}</div>
            <div style="display:flex;gap:7px;align-items:center">
              <span style="font-size:10px;padding:2px 8px;border-radius:20px;background:${dk.accent}22;color:${dk.accent};font-weight:600">${dk.level}</span>
              <span style="font-size:12px;color:#555">${dk.cards.length} cartes</span>
              ${due>0?`<span style="font-size:11px;padding:2px 7px;background:#fff3e0;color:#e65100;border-radius:20px">🕐 ${due}</span>`:''}
            </div>
          </div>
          <button onclick="event.stopPropagation();startStudy('${dk.id}')" style="background:${dk.accent};color:#fff;border:none;border-radius:9px;padding:9px 14px;font-size:13px;cursor:pointer" ${!dk.cards.length?'disabled':''}>Étudier</button>
        </div>
      </div>

  render();setTimeout(()=>{const m=document.getElementById('dlgm');if(m)m.scrollTop=m.scrollHeight;},50);
}
function ansTOEIC(opt){const q=TOEIC[S.toeicIdx||0];S.toeicSel=opt;const ok=q.opts[q.a]===opt;if(!S.toeicData)S.toeicData={sc:0};if(ok)S.toeicData.sc++;addXP(ok?15:3);render();}
function nxtTOEIC(){const i=S.toeicIdx||0;if(i+1>=TOEIC.length){S.toeicDone=true;S.toeicScore=S.toeicData?.sc||0;}else{S.toeicIdx=i+1;S.toeicSel=null;}render();}
async function chkTrans(sent){
  const inp=document.getElementById('tinp');if(!inp||!inp.value.trim())return;
  const ut=inp.value.trim();inp.disabled=true;
  document.getElementById('tr').innerHTML='<div style="color:var(--m);font-size:13px;padding:10px">Correction en cours...</div>';
  try{const r=await claude([{role:'user',content:`Phrase française: "${sent}"\nTraduction élève: "${ut}"\nJSON sans backticks: {"score":0-100,"correction":"traduction idéale","feedback":"commentaire en français"}`}],'Tu es un correcteur. UNIQUEMENT JSON valide sans backticks.');
  const p=JSON.parse(r);S.transRes=p;if(p.score>=80)addXP(20);else if(p.score>=50)addXP(10);else addXP(3);
  document.getElementById('tr').innerHTML=rTransR(p);}catch{document.getElementById('tr').innerHTML='<div style="color:red;font-size:13px">Erreur.</div>';}
}
function setAI(t){const i=document.getElementById('aii');if(i){i.value=t;i.focus();}}
async function sendAI(){
  const inp=document.getElementById('aii');if(!inp||!inp.value.trim())return;
  const text=inp.value.trim();inp.value='';
  if(!S.aiMsgs)S.aiMsgs=[{r:'a',c:'Bonjour !'}];
  S.aiMsgs.push({r:'u',c:text});addXP(5);render();
  setTimeout(()=>{const l=document.getElementById('ail');if(l)l.style.display='block';const m=document.getElementById('aim');if(m)m.scrollTop=m.scrollHeight;},50);
  const errs=[...new Set(S.errLog.filter(e=>!e.ok).map(e=>e.w))].slice(0,8).join(', ');
  const sys=`Tu es un tuteur d'anglais pour francophones. Si français, réponds en français avec exemples anglais. Si anglais, réponds en anglais et corrige doucement. Sois concis et pédagogique. ${S.userLvl?`Niveau: ${S.userLvl}.`:''} ${errs?`Erreurs récentes: ${errs}.`:''}`;
  try{const r=await claude(S.aiMsgs.map(m=>({role:m.r==='u'?'user':'assistant',content:m.c})),sys);S.aiMsgs.push({r:'a',c:r});}
  catch{S.aiMsgs.push({r:'a',c:'Erreur de connexion. Réessaie !'});}
  render();setTimeout(()=>{const m=document.getElementById('aim');if(m)m.scrollTop=m.scrollHeight;},50);
}
async function genReport(){
  const btn=document.getElementById('repbtn');if(btn){btn.textContent='...';btn.disabled=true;}
  const repc=document.getElementById('repc');
  const mastered=Object.values(S.srs).filter(x=>x.srsInterval>=7).length;
  const errs=[...new Set(S.errLog.filter(e=>!e.ok).map(e=>e.w))].slice(0,5).join(', ');
  try{const r=await claude([{role:'user',content:`Rapport hebdomadaire pour un apprenant d'anglais. Niveau: ${S.userLvl||'inconnu'}, ${S.xp} XP, streak ${S.streak} jours, ${mastered} cartes maîtrisées, mots ratés: ${errs||'aucun'}. Bilan 5 lignes: points forts, à améliorer, 2 recommandations. Sois encourageant.`}],'Tu es un coach pédagogique. Réponds en français.');
  S.report=r;sv('report');addXP(20);if(repc)repc.innerHTML=`<div style="font-size:13px;line-height:1.7">${esc(r).replace(/\n/g,'<br>')}</div>`;}
  catch{if(repc)repc.innerHTML='<div style="color:red;font-size:13px">Erreur.</div>';}
  if(btn){btn.textContent='Regénérer ✨';btn.disabled=false;}
}
function doSpeech(){
  if(!window.SpeechRecognition&&!window.webkitSpeechRecognition){alert('Non supporté.');return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;const r=new SR();r.lang='en-US';r.interimResults=false;
  const c=S.studyDeck?.cards[S.studyIdx||0];if(!c)return;
  r.onresult=e=>{const said=e.results[0][0].transcript.toLowerCase();const res=document.getElementById('spkr');const ok=said.includes(c.word.toLowerCase());if(res)res.innerHTML=`<div style="font-size:12px;color:${ok?'#4caf50':'var(--m)'};padding:4px 0">🎤 "${esc(said)}" ${ok?'✓':'— Réessaie !'}</div>`;if(ok)addXP(5);};
  r.onerror=()=>{};r.start();
}
function mkDeck(){const name=document.getElementById('mn')?.value?.trim();if(!name)return;S.decks.push({id:uid(),name,level:mL,color:'#e8eef8',accent:'#3b6fd4',cards:[]});sv('decks');closeM();render();}
function delDk(id){if(!confirm('Supprimer ?'))return;S.decks=S.decks.filter(d=>d.id!==id);sv('decks');render();}
async function doAI(){
  const w=document.getElementById('mw')?.value?.trim();if(!w)return;
  const btn=document.getElementById('aib');if(btn){btn.textContent='...';btn.disabled=true;}
  try{const r=await claude([{role:'user',content:`Traduction française et exemple pour "${w}". JSON sans backticks: {"translation":"...","example":"..."}`}],'UNIQUEMENT JSON valide sans backticks.');
  const p=JSON.parse(r);const mt=document.getElementById('mt'),me=document.getElementById('me');if(mt&&p.translation)mt.value=p.translation;if(me&&p.example)me.value=p.example;}catch{}
  if(btn){btn.textContent='✨ IA';btn.disabled=false;}
}
function addC(deckId){
  const w=document.getElementById('mw')?.value?.trim(),t=document.getElementById('mt')?.value?.trim();if(!w||!t)return;
  const card={id:uid(),word:w,tr:t,ex:document.getElementById('me')?.value?.trim()||''};
  S.decks=S.decks.map(d=>d.id===deckId?{...d,cards:[...d.cards,card]}:d);sv('decks');closeM();render();
}
function delC(did,cid){S.decks=S.decks.map(d=>d.id===did?{...d,cards:d.cards.filter(c=>c.id!==cid)}:d);sv('decks');render();}
function impDeck(){
  const raw=document.getElementById('mit')?.value||'',name=document.getElementById('min')?.value||'Deck importé';
  const cards=raw.trim().split('\n').filter(l=>l.trim()).map(line=>{const p=line.split(/[;,\t]/).map(s=>s.trim());if(p.length>=2&&p[0]&&p[1])return{id:uid(),word:p[0],tr:p[1],ex:p[2]||''};return null;}).filter(Boolean);
  if(!cards.length){alert('Format non reconnu.');return;}
  S.decks.push({id:uid(),name,level:'A1',color:'#e8eef8',accent:'#3b6fd4',cards});sv('decks');closeM();render();
}
async function genDeck(){
  const theme=document.getElementById('mth')?.value?.trim();if(!theme)return;
  const btn=document.getElementById('gnb');if(btn){btn.textContent='Génération...';btn.disabled=true;}
  try{const r=await claude([{role:'user',content:`Génère ${mCnt} flashcards anglais niveau ${mL} sur: "${theme}". JSON sans backticks: {"deckName":"...","cards":[{"word":"...","translation":"...","example":"..."}]}`}],'UNIQUEMENT JSON valide sans backticks.');
  const p=JSON.parse(r);if(p.cards?.length){S.decks.push({id:uid(),name:p.deckName||theme,level:mL,color:'#f3e8f8',accent:'#9c27b0',cards:p.cards.map(c=>({...c,id:uid(),tr:c.translation,ex:c.example}))});sv('decks');closeM();render();}else throw new Error();}
  catch{const e=document.getElementById('ge');if(e)e.textContent='Erreur. Réessaie.';if(btn){btn.textContent='✨ Générer';btn.disabled=false;}}
}
async function claude(messages,system='Tu es un assistant utile.'){
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,system,messages})});
  const data=await res.json();return data.content?.map(b=>b.text||'').join('')||'';
}
render();
</script>
