<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Learn English</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f4f0;
  --s:#fff;
  --b:#e8e8e4;
  --t:#1a1a1a;
  --m:#999;
  --f:#f0f0ec;
  --a:#1a1a1a;
  --g:#4caf50;
  --bl:#3b6fd4;
  --or:#e07b39;
  --red:#c62828;
}
.dk{
  --bg:#111;
  --s:#1c1c1f;
  --b:#2a2a2e;
  --t:#f0f0ed;
  --m:#888;
  --f:#222226;
  --a:#f0f0ed;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--t);
  font-family:'DM Sans',sans-serif;
  transition:background .3s,color .3s;
}
h1,h2,h3{font-family:'Playfair Display',serif}
button{cursor:pointer;font-family:'DM Sans',sans-serif}
input,textarea,select{
  font-family:'DM Sans',sans-serif;
  background:var(--f);
  color:var(--t);
  border:1px solid var(--b);
  border-radius:9px;
  padding:10px 14px;
  font-size:14px;
  outline:none;
  width:100%;
}
input:focus,textarea:focus,select:focus{border-color:var(--bl)}
.card{
  background:var(--s);
  border:1px solid var(--b);
  border-radius:16px;
  padding:20px;
}
.bp{
  background:var(--a);
  color:var(--bg);
  border:none;
  border-radius:9px;
  padding:11px 18px;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:5px;
}
.bg{
  background:var(--f);
  color:var(--m);
  border:1px solid var(--b);
  border-radius:9px;
  padding:11px 18px;
  font-size:13px;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:5px;
}
.bs{
  background:#f0faf0;
  color:#2e7d32;
  border:1px solid #c8e6c9;
  border-radius:9px;
  padding:11px 18px;
  font-size:13px;
  cursor:pointer;
}
.bd{
  background:#fff5f5;
  color:#c62828;
  border:1px solid #fcd0d0;
  border-radius:9px;
  padding:11px 18px;
  font-size:13px;
  cursor:pointer;
}
.pbar{
  height:5px;
  background:var(--f);
  border-radius:3px;
  overflow:hidden;
}
.pfill{
  height:100%;
  border-radius:3px;
  transition:width .6s;
}
.tab-bar{
  display:flex;
  gap:5px;
  overflow-x:auto;
  padding-bottom:4px;
  margin-bottom:18px;
}
.tab-bar::-webkit-scrollbar{display:none}
.tbtn{
  padding:7px 12px;
  border:1px solid var(--b);
  border-radius:8px;
  font-size:11.5px;
  white-space:nowrap;
  flex-shrink:0;
  background:var(--s);
  color:var(--m);
}
.tbtn.on{
  background:var(--a);
  color:var(--bg);
  border-color:var(--a);
}
.opt{
  padding:13px 16px;
  border-radius:9px;
  text-align:left;
  font-size:14px;
  border:1px solid var(--b);
  background:var(--f);
  color:var(--t);
  width:100%;
  display:block;
  margin-bottom:9px;
  cursor:pointer;
}
.opt.ok{
  background:#f0faf0!important;
  border-color:#4caf50!important;
  color:#2e7d32!important;
}
.opt.no{
  background:#fff5f5!important;
  border-color:#f44336!important;
  color:#c62828!important;
}
.bnav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:var(--s);
  border-top:1px solid var(--b);
  display:flex;
  z-index:100;
}
.nit{
  flex:1;
  padding:10px 4px 12px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  border:none;
  background:none;
  font-size:9px;
  color:var(--m);
}
.nit.on{color:var(--a)}
#app{
  max-width:480px;
  margin:0 auto;
  padding:24px 16px 80px;
}
.cbai{
  background:var(--f);
  border-radius:18px 18px 18px 4px;
  padding:11px 15px;
  max-width:85%;
  font-size:14px;
  line-height:1.6;
}
.cbme{
  background:var(--a);
  color:var(--bg);
  border-radius:18px 18px 4px 18px;
  padding:11px 15px;
  max-width:85%;
  font-size:14px;
  line-height:1.6;
}
@keyframes bounce{
  0%,80%,100%{transform:translateY(0)}
  40%{transform:translateY(-6px)}
}
@keyframes fu{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
.dl span{
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--m);
  display:inline-block;
  animation:bounce 1s infinite;
}
.dl span:nth-child(2){animation-delay:.15s}
.dl span:nth-child(3){animation-delay:.3s}
.xpa{
  animation:fu 1.4s ease forwards;
  position:fixed;
  top:80px;
  right:20px;
  font-size:18px;
  font-weight:700;
  color:var(--g);
  pointer-events:none;
  z-index:300;
  font-family:'Playfair Display',serif;
}
.story-t{
  font-size:15px;
  line-height:2.1;
  padding:20px;
  background:var(--f);
  border-radius:14px;
  border:1px solid var(--b);
}
.modal-ov{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:200;
  padding:16px;
}
.modal{
  background:var(--s);
  border-radius:20px;
  padding:26px;
  width:100%;
  max-width:440px;
  max-height:90vh;
  overflow-y:auto;
}
.ob{
  position:fixed;
  inset:0;
  background:var(--bg);
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  overflow-y:auto;
}
.sec{
  font-size:11px;
  letter-spacing:.15em;
  text-transform:uppercase;
  color:var(--m);
  margin-bottom:14px;
}
.lbl{
  font-size:11px;
  color:var(--m);
  letter-spacing:.05em;
  display:block;
  margin-bottom:5px;
}
.small{
  font-size:12px;
  color:var(--m);
  line-height:1.6;
}
.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.grid3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}
.deck-row{
  padding:12px;
  border:1px solid var(--b);
  border-radius:10px;
  background:var(--f);
  margin-bottom:8px;
}
</style>
</head>
<body>
<div id="xpt"></div>
<div id="ob" class="ob" style="display:none"></div>
<div id="app" style="display:none"></div>
<nav class="bnav" id="bnav" style="display:none"></nav>

<script>
const LS={
  get:(k,d)=>{
    try{
      const v=localStorage.getItem('le_'+k);
      return v?JSON.parse(v):d;
    }catch{
      return d;
    }
  },
  set:(k,v)=>{
    try{
      localStorage.setItem('le_'+k,JSON.stringify(v));
    }catch{}
  }
};

const uid=()=>'_'+Math.random().toString(36).slice(2,9);

const esc=s=>String(s||'')
  .replace(/&/g,'&amp;')
  .replace(/</g,'&lt;')
  .replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;');

const today=()=>new Date().toDateString();

const tts=(t,r=.9)=>{
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang='en-US';
  u.rate=r;
  window.speechSynthesis.speak(u);
};

function getLvl(xp){
  let l=LVLS[0];
  for(const t of LVLS){
    if(xp>=t.min)l=t;
  }
  return l;
}

function srsNext(c,ok){
  const now=Date.now();
  const i=c.srsInterval||1;
  const e=c.srsEase||2.5;

  if(!ok){
    return{
      srsInterval:1,
      srsEase:Math.max(1.3,e-.2),
      srsNextReview:now+60000
    };
  }

  const ni=Math.round(i*e);
  return{
    srsInterval:ni,
    srsEase:Math.min(3,e+.1),
    srsNextReview:now+ni*86400000
  };
}

function updStreak(){

}

function genQCM(c){
  const all=S.decks.flatMap(d=>d.cards);
  const oth=all
    .filter(x=>x.id!==c.id&&x.tr!==c.tr)
    .sort(()=>Math.random()-.5)
    .slice(0,3)
    .map(x=>x.tr);

  while(oth.length<3){
    oth.push(['Je ne sais pas','Autre réponse','Réponse proche'][oth.length]||'Autre');
  }

  return[...oth,c.tr].sort(()=>Math.random()-.5);
}

function toggleCustomDeck(id){
  const selected=S.customDecks||[];

  if(selected.includes(id)){
    S.customDecks=selected.filter(x=>x!==id);
  }else{
    S.customDecks=[...selected,id];
  }

  sv('customDecks');
  render();
}

function setCustomCount(n){
  S.customCount=n;
  sv('customCount');
  render();
}

function startCustomStudy(mode){
  const selected=S.customDecks||[];

  if(!selected.length){
    toast('Sélectionne au moins un deck.','#e07b39');
    return;
  }

  let cards=S.decks
    .filter(d=>selected.includes(d.id))
    .flatMap(d=>d.cards.map(c=>({
      ...c,
      deckName:d.name,
      deckAccent:d.accent
    })));

  if(!cards.length){
    toast('Les decks sélectionnés sont vides.','#e07b39');
    return;
  }

  if(mode==='srs'){
    cards=cards.filter(c=>{
      const s=S.srs[c.id];
      return !s?.srsNextReview || s.srsNextReview<=Date.now();
    });

    if(!cards.length){
      toast('Aucune carte à revoir en SRS.','#4caf50');
      return;
    }

    cards.sort((a,b)=>{
      const sa=S.srs[a.id]?.srsNextReview||0;
      const sb=S.srs[b.id]?.srsNextReview||0;
      return sa-sb;
    });
  }else{
    cards=shuffle(cards);
  }

  cards=cards.slice(0,S.customCount||10);

  S.studyDeck={
    id:'__custom__',
    name:mode==='srs'?'Session personnalisée SRS':'Session personnalisée aléatoire',
    level:'',
    color:'#e8eef8',
    accent:mode==='srs'?'#4caf50':'#3b6fd4',
    cards
  };

  S.studyIdx=0;
  S.studyMode='flip';
  S.flipped=false;
  S.qopts=null;

  updStreak();
  earnB('b1');
  render();
}

  const th=s.text.split(/(\s+)/).map(w=>{

    <span style="font-size:12px;color:var(--m)">${idx+1}/${TOEIC.length}</span>
  </div>

  <div class="pbar" style="margin-bottom:16px">
    <div class="pfill" style="width:${Math.round((idx/TOEIC.length)*100)}%;background:var(--bl)"></div>
  </div>

  <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:600;line-height:1.5;margin-bottom:18px">
    ${esc(q.q)}
  </div>

  <div>
    ${q.opts.map((o,i)=>`
      <button class="opt ${sel!==null?(i===q.a?'ok':(o===sel?'no':'')):''}" onclick="ansTOEIC('${esc(o)}')" ${sel!==null?'disabled':''}>
        ${esc(o)}
      </button>
    `).join('')}
  </div>

  ${sel!==null?`
    <div style="margin-top:12px;padding:13px;background:var(--f);border-radius:9px;font-size:13px;color:var(--m);line-height:1.6">
      💡 ${esc(q.exp)}
      <button class="bp" onclick="nxtTOEIC()" style="display:block;margin-top:10px;width:100%">
        ${idx+1>=TOEIC.length?'Résultats':'Suivant'}
      </button>
    </div>
  `:''}`;
}

function resetTOEIC(){
  S.toeicIdx=0;
  S.toeicSel=null;
  S.toeicDone=false;
  S.toeicScore=0;
  S.toeicData=null;
  render();
}

function rLT(){
  if(!S.ltData){
    return`
    <div style="text-align:center;padding:20px 0">
      <div style="font-size:40px;margin-bottom:14px">🎯</div>
      <h2 style="margin-bottom:10px">Test de niveau</h2>
      <p style="color:var(--m);font-size:14px;margin-bottom:24px">
        40 questions de A1 à C2.
      </p>
      <button class="bp" onclick="startLT()" style="font-size:15px;padding:13px 28px">
        Commencer
      </button>
    </div>`;
  }

  const {idx,sc,sel,done,answers}=S.ltData;

  if(done){
    const scoreByLevel={A1:0,A2:0,B1:0,B2:0,C1:0,C2:0};
    const totalByLevel={A1:0,A2:0,B1:0,B2:0,C1:0,C2:0};

    LTQS.forEach((q,i)=>{
      totalByLevel[q.lvl]++;
      if(answers[i])scoreByLevel[q.lvl]++;
    });

    const pct=sc/LTQS.length;
    let lv='A1';
    if(pct>=.88)lv='C2';
    else if(pct>=.75)lv='C1';
    else if(pct>=.62)lv='B2';
    else if(pct>=.48)lv='B1';
    else if(pct>=.30)lv='A2';

    return`
    <div style="text-align:center;padding:24px 0">
      <div style="font-size:48px;margin-bottom:12px">🎯</div>
      <div style="font-family:'Playfair Display',serif;font-size:52px;font-weight:700;color:var(--bl)">
        ${lv}
      </div>
      <div style="font-size:14px;color:var(--m);margin-bottom:18px">
        ${sc}/${LTQS.length} bonnes réponses
      </div>

      <div class="card" style="text-align:left;margin-bottom:14px">
        <div class="sec">Détail par niveau</div>
        ${Object.keys(totalByLevel).map(k=>`
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
            <span>${k}</span>
            <span>${scoreByLevel[k]}/${totalByLevel[k]}</span>
          </div>
        `).join('')}
      </div>

      <button class="bp" onclick="S.userLvl='${lv}';sv('userLvl');toast('Niveau enregistré');S.ltData=null;earnB('b8');render()" style="width:100%;margin-bottom:10px">
        Enregistrer
      </button>
      <button class="bg" onclick="S.ltData=null;render()" style="width:100%">
        Refaire plus tard
      </button>
    </div>`;
  }

  const q=LTQS[idx];

  return`
  <div style="display:flex;justify-content:space-between;margin-bottom:14px">
    <span style="font-size:12px;color:var(--m)">Test de niveau · ${q.lvl}</span>
    <span style="font-size:12px;color:var(--m)">${idx+1}/${LTQS.length}</span>
  </div>

  <div class="pbar" style="margin-bottom:16px">
    <div class="pfill" style="width:${Math.round((idx/LTQS.length)*100)}%;background:var(--bl)"></div>
  </div>

  <div style="font-family:'Playfair Display',serif;font-size:21px;font-weight:600;line-height:1.5;margin-bottom:18px">
    ${esc(q.q)}
  </div>

  <div>
    ${q.opts.map((o,i)=>`
      <button class="opt ${sel!==null?(i===q.a?'ok':(o===sel?'no':'')):''}" onclick="ansLT(${i})" ${sel!==null?'disabled':''}>
        ${esc(o)}
      </button>
    `).join('')}
  </div>

  ${sel!==null?`
    <div style="display:flex;justify-content:flex-end;margin-top:14px">
      <button class="bp" onclick="nxtLT()">
        ${idx+1>=LTQS.length?'Résultats':'Suivant'}
      </button>
    </div>
  `:''}`;
}

function startLT(){
  S.ltData={
    idx:0,
    sc:0,
    sel:null,
    done:false,
    answers:{}
  };
  render();
}

function ansLT(i){
  const q=LTQS[S.ltData.idx];
  S.ltData.sel=q.opts[i];

  const ok=i===q.a;
  if(ok){
    S.ltData.sc++;
    S.ltData.answers[S.ltData.idx]=true;
    addXP(3);
  }else{
    S.ltData.answers[S.ltData.idx]=false;
  }

  logErr(q.q,ok);
  render();
}

function nxtLT(){
  const d=S.ltData;

  if(d.idx+1>=LTQS.length){
    d.done=true;
  }else{
    d.idx++;
    d.sel=null;
  }

  render();
}
function renderOb(){
  const ob=document.getElementById('ob');
  ob.style.display='flex';

  const step=S.obStep||0;

  if(step===0){
    ob.innerHTML=`
    <div style="max-width:400px;width:100%;text-align:center">
      <div style="font-size:64px;margin-bottom:16px">🇬🇧</div>
      <h1 style="font-size:32px;margin-bottom:12px">Learn English</h1>
      <p style="color:var(--m);font-size:15px;line-height:1.7;margin-bottom:32px">
        Apprends l'anglais avec tes propres decks, un système SRS, des exercices et des examens.
      </p>
      <button class="bp" onclick="S.obStep=1;renderOb()" style="font-size:15px;padding:14px 32px;width:100%">
        Commencer
      </button>
    </div>`;
  }

  else if(step===1){
    ob.innerHTML=`
    <div style="max-width:400px;width:100%">
      <h2 style="font-size:24px;margin-bottom:20px">Ton niveau actuel ?</h2>

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px">
        ${LVLS.map(l=>`
          <div onclick="S.userLvl='${l.l}';sv('userLvl');renderOb()" style="padding:16px 8px;border:2px solid ${S.userLvl===l.l?'var(--a)':'var(--b)'};border-radius:13px;cursor:pointer;text-align:center;background:${S.userLvl===l.l?'var(--f)':'var(--s)'}">
            <div style="font-size:22px;font-family:'Playfair Display',serif;font-weight:700;color:${l.c}">
              ${l.l}
            </div>
            <div style="font-size:11px;color:var(--m)">${l.label}</div>
          </div>
        `).join('')}
      </div>

      <button class="bp" onclick="S.obStep=2;renderOb()" style="width:100%">
        Continuer
      </button>
    </div>`;
  }

  else{
    ob.innerHTML=`
    <div style="max-width:400px;width:100%">
      <h2 style="font-size:24px;margin-bottom:6px">Objectif quotidien</h2>
      <p style="color:var(--m);font-size:13px;margin-bottom:20px">Combien de cartes par jour ?</p>

      <div style="display:flex;gap:10px;margin-bottom:24px">
        ${[5,10,15,20].map(n=>`
          <div onclick="S.dailyG=${n};sv('dailyG');renderOb()" style="flex:1;padding:16px 4px;border:2px solid ${S.dailyG===n?'var(--a)':'var(--b)'};border-radius:13px;cursor:pointer;text-align:center;background:${S.dailyG===n?'var(--f)':'var(--s)'}">
            <div style="font-size:20px;font-family:'Playfair Display',serif;font-weight:700">${n}</div>
            <div style="font-size:10px;color:var(--m)">cartes</div>
          </div>
        `).join('')}
      </div>

      <button class="bp" onclick="finOb()" style="width:100%;font-size:15px;padding:14px">
        Démarrer
      </button>
    </div>`;
  }
}

function finOb(){
  S.obDone=true;
  sv('obDone');
  document.getElementById('ob').style.display='none';
  render();
}

let mL='A1';

function showM(type,extra){
  const o=document.createElement('div');
  o.className='modal-ov';
  o.id='movl';
  o.onclick=e=>{
    if(e.target===o)closeM();
  };

  let inner='';

  if(type==='cdeck'){
    inner=`
    <h2 style="margin-bottom:20px">Nouveau deck</h2>

    <label class="lbl">Nom *</label>
    <input id="mn" placeholder="ex: Vocabulaire Business" style="margin-bottom:12px">

    <label class="lbl">Niveau</label>
    <div style="display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap">
      ${['A1','A2','B1','B2','C1','C2'].map(l=>`
        <button class="${mL===l?'bp':'bg'} lsl" data-l="${l}" onclick="selL(this)" style="flex:1">
          ${l}
        </button>
      `).join('')}
    </div>

    <button class="bp" onclick="mkDeck()" style="width:100%">Créer</button>`;
  }

  else if(type==='acard'){
    inner=`
    <h2 style="margin-bottom:20px">Nouvelle carte</h2>

    <label class="lbl">Mot anglais *</label>
    <input id="mw" placeholder="ex: Ephemeral" style="margin-bottom:10px">

    <label class="lbl">Traduction *</label>
    <input id="mt" placeholder="ex: Éphémère" style="margin-bottom:10px">

    <label class="lbl">Exemple</label>
    <input id="me" placeholder="ex: Fame can be ephemeral." style="margin-bottom:14px">

    <button class="bp" onclick="addC('${extra}')" style="width:100%">Ajouter</button>`;
  }

  else if(type==='imp'){
    inner=`
    <h2 style="margin-bottom:6px">Importer un deck</h2>
    <div style="font-size:12px;color:var(--m);margin-bottom:16px;line-height:1.6">
      Une carte par ligne.<br>
      Format : <strong>Mot ; Traduction ; Exemple</strong>
    </div>

    <label class="lbl">Nom du deck</label>
    <input id="min" value="Deck importé" style="margin-bottom:10px">

    <label class="lbl">Niveau</label>
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
      ${['A1','A2','B1','B2','C1','C2'].map(l=>`
        <button class="${mL===l?'bp':'bg'} lsl" data-l="${l}" onclick="selL(this)" style="flex:1">
          ${l}
        </button>
      `).join('')}
    </div>

    <textarea id="mit" placeholder="Ephemeral ; Éphémère ; Fame can be ephemeral&#10;Reliable ; Fiable ; This source is reliable." style="height:150px;resize:vertical;margin-bottom:10px"></textarea>

    <button class="bp" onclick="impDeck()" style="width:100%">Importer</button>`;
  }

  o.innerHTML=`<div class="modal">${inner}</div>`;
  document.body.appendChild(o);
}

function closeM(){
  const o=document.getElementById('movl');
  if(o)o.remove();
}

function selL(b){
  document.querySelectorAll('.lsl').forEach(x=>{
    x.classList.remove('bp');
    x.classList.add('bg');
  });

  b.classList.remove('bg');
  b.classList.add('bp');
  mL=b.dataset.l;
}

function toggleDk(){
  S.dk=!S.dk;
  sv('dk');
  render();
}

function setTab(t){
  S.tab=t;
  S.studyDeck=null;
  render();
}

function tog(id){
  const el=document.getElementById(id);
  if(el)el.style.display=el.style.display==='none'?'block':'none';
}

function startDaily(){
  const due=S.decks
    .flatMap(d=>d.cards.map(c=>({
      ...c,
      deckName:d.name,
      deckAccent:d.accent
    })))
    .filter(c=>{
      const s=S.srs[c.id];
      return !s?.srsNextReview||s.srsNextReview<=Date.now();
    });

  if(!due.length){
    toast('Toutes tes cartes sont à jour.','#4caf50');
    return;
  }

  S.studyDeck={
    id:'__rev__',
    name:`Révision (${due.length})`,
    level:'',
    color:'#e8eef8',
    accent:'#3b6fd4',
    cards:due
  };

  S.studyIdx=0;
  S.studyMode='flip';
  S.flipped=false;
  S.qopts=null;

  updStreak();
  earnB('b1');
  S.tab='decks';
  render();
}

function startStudy(id){
  const dk=S.decks.find(d=>d.id===id);
  if(!dk||!dk.cards.length)return;

  S.studyDeck={
    ...dk,
    cards:shuffle(dk.cards.map(c=>({
      ...c,
      deckName:dk.name,
      deckAccent:dk.accent
    })))
  };

  S.studyIdx=0;
  S.studyMode='flip';
  S.flipped=false;
  S.qopts=null;

  updStreak();
  earnB('b1');
  render();
}

function endStudy(){
  S.studyDeck=null;
  S.studyIdx=0;
  sv('srs');
  render();
}

function setSM(m){
  S.studyMode=m;
  S.flipped=false;
  S.qopts=null;
  render();
}

function doFlip(){
  S.flipped=!S.flipped;
  render();
}

function ans(ok){
  const c=S.studyDeck.cards[S.studyIdx||0];
  const srs=srsNext(S.srs[c.id]||{},ok);

  S.srs[c.id]=srs;

  addXP(ok?10:3);
  incD();
  logErr(c.word,ok);
  earnB('b1');

  S.studyIdx=(S.studyIdx||0)+1;
  S.flipped=false;
  S.qopts=null;

  if(S.studyIdx>=S.studyDeck.cards.length)sv('srs');
  render();
}

function ansQ(opt){
  const c=S.studyDeck.cards[S.studyIdx||0];
  const ok=opt===c.tr;

  document.querySelectorAll('.opt').forEach(b=>{
    if(b.textContent.trim()===c.tr)b.classList.add('ok');
    else if(b.textContent.trim()===opt&&!ok)b.classList.add('no');
    b.disabled=true;
  });

  addXP(ok?12:2);
  logErr(c.word,ok);

  const srs=srsNext(S.srs[c.id]||{},ok);
  S.srs[c.id]=srs;

  incD();

  setTimeout(()=>{
    S.studyIdx=(S.studyIdx||0)+1;
    S.qopts=null;
    if(S.studyIdx>=S.studyDeck.cards.length)sv('srs');
    render();
  },1000);
}

function chkFill(){
  const inp=document.getElementById('finp');
  if(!inp)return;

  const c=S.studyDeck.cards[S.studyIdx||0];
  const a=inp.value.trim().toLowerCase();
  const co=c.tr.toLowerCase();

  const ok=a===co||co.includes(a)||a.includes(co.split('/')[0].trim().toLowerCase());

  inp.style.borderColor=ok?'#4caf50':'#f44336';
  inp.disabled=true;

  const res=document.getElementById('fr');
  if(res){
    res.innerHTML=`
    <div style="padding:12px;background:${ok?'#f0faf0':'#fff5f5'};border-radius:9px;font-size:14px;color:${ok?'#2e7d32':'#c62828'}">
      ${ok?'Correct · +15 XP':`C'était : "${esc(c.tr)}"`}
      <button class="bp" onclick="S.studyIdx=(S.studyIdx||0)+1;S.qopts=null;render()" style="display:block;margin-top:10px;width:100%">
        Suivant
      </button>
    </div>`;
  }

  if(ok)addXP(15);
  else addXP(2);

  const srs=srsNext(S.srs[c.id]||{},ok);
  S.srs[c.id]=srs;

  incD();

  const fb=document.getElementById('fbtn');
  if(fb)fb.style.display='none';
}

function ansGQ(opt){
  const q=GQUIZ[S.gqd.idx];
  S.gqd.sel=opt;

  const ok=q.opts[q.a]===opt;
  if(ok)S.gqd.sc++;

  addXP(ok?15:3);
  logErr(q.q,ok);
  render();
}

function nxtGQ(){
  const d=S.gqd;

  if(d.idx+1>=GQUIZ.length){
    d.done=true;
    if(d.sc===GQUIZ.length)earnB('b6');
  }else{
    d.idx++;
    d.sel=null;
  }

  render();
}

function togPhr(idx){
  if(S.phrases.includes(idx)){
    S.phrases=S.phrases.filter(x=>x!==idx);
  }else{
    S.phrases.push(idx);
    addXP(8);
  }

  sv('phrases');
  render();
}

function chkDict(){
  const inp=document.getElementById('dinp');
  if(!inp)return;

  const c=DICT_WORDS[(S.dictIdx||0)%DICT_WORDS.length];
  const ok=inp.value.trim().toLowerCase()===c.word.toLowerCase();

  inp.style.borderColor=ok?'#4caf50':'#f44336';
  inp.disabled=true;

  const res=document.getElementById('dr');
  if(res){
    res.innerHTML=`
    <div style="padding:12px;background:${ok?'#f0faf0':'#fff5f5'};border-radius:9px;font-size:14px;color:${ok?'#2e7d32':'#c62828'};margin-top:10px">
      ${ok?'Parfait · +15 XP':`C'était : "${esc(c.word)}" · ${esc(c.tr)}`}
      <button class="bp" onclick="S.dictIdx=(S.dictIdx||0)+1;render()" style="display:block;margin-top:10px;width:100%">
        Suivant
      </button>
    </div>`;
  }

  if(ok)addXP(15);
  else addXP(2);
}

function ansTOEIC(opt){
  const q=TOEIC[S.toeicIdx||0];

  S.toeicSel=opt;

  const ok=q.opts[q.a]===opt;

  if(!S.toeicData)S.toeicData={sc:0};
  if(ok)S.toeicData.sc++;

  addXP(ok?10:2);
  logErr(q.q,ok);
  render();
}

function nxtTOEIC(){
  const i=S.toeicIdx||0;

  if(i+1>=TOEIC.length){
    S.toeicDone=true;
    S.toeicScore=S.toeicData?.sc||0;
    earnB('b8');
  }else{
    S.toeicIdx=i+1;
    S.toeicSel=null;
  }

  render();
}

function doSpeech(){
  if(!window.SpeechRecognition&&!window.webkitSpeechRecognition){
    alert('Reconnaissance vocale non supportée sur cet appareil.');
    return;
  }

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const r=new SR();

  r.lang='en-US';
  r.interimResults=false;

  const c=S.studyDeck?.cards[S.studyIdx||0];
  if(!c)return;

  r.onresult=e=>{
    const said=e.results[0][0].transcript.toLowerCase();
    const res=document.getElementById('spkr');
    const ok=said.includes(c.word.toLowerCase());

    if(res){
      res.innerHTML=`
      <div style="font-size:12px;color:${ok?'#4caf50':'var(--m)'};padding:4px 0">
        🎤 "${esc(said)}" ${ok?'✓':'— Réessaie'}
      </div>`;
    }

    if(ok)addXP(5);
  };

  r.onerror=()=>{};
  r.start();
}

function mkDeck(){
  const name=document.getElementById('mn')?.value?.trim();
  if(!name)return;

  S.decks.push({
    id:uid(),
    name,
    level:mL,
    color:'#e8eef8',
    accent:'#3b6fd4',
    cards:[]
  });

  sv('decks');
  closeM();
  render();
}

function delDk(id){
  if(!confirm('Supprimer ce deck ?'))return;

  S.decks=S.decks.filter(d=>d.id!==id);
  S.customDecks=(S.customDecks||[]).filter(x=>x!==id);

  sv('decks');
  sv('customDecks');
  render();
}

function addC(deckId){
  const w=document.getElementById('mw')?.value?.trim();
  const t=document.getElementById('mt')?.value?.trim();

  if(!w||!t)return;

  const card={
    id:uid(),
    word:w,
    tr:t,
    ex:document.getElementById('me')?.value?.trim()||''
  };

  S.decks=S.decks.map(d=>
    d.id===deckId
      ?{...d,cards:[...d.cards,card]}
      :d
  );

  sv('decks');
  closeM();
  render();
}

function delC(did,cid){
  S.decks=S.decks.map(d=>
    d.id===did
      ?{...d,cards:d.cards.filter(c=>c.id!==cid)}
      :d
  );

  delete S.srs[cid];

  sv('decks');
  sv('srs');
  render();
}

function impDeck(){
  const raw=document.getElementById('mit')?.value||'';
  const name=document.getElementById('min')?.value?.trim()||'Deck importé';

  const cards=raw
    .trim()
    .split('\n')
    .filter(l=>l.trim())
    .map(line=>{
      const p=line.split(/[;,\t]/).map(s=>s.trim());

      if(p.length>=2&&p[0]&&p[1]){
        return{
          id:uid(),
          word:p[0],
          tr:p[1],
          ex:p[2]||''
        };
      }

      return null;
    })
    .filter(Boolean);

  if(!cards.length){
    alert('Format non reconnu. Exemple : word ; traduction ; phrase exemple');
    return;
  }

  S.decks.push({
    id:uid(),
    name,
    level:mL,
    color:'#e8eef8',
    accent:'#3b6fd4',
    cards
  });

  sv('decks');
  closeM();
  render();
}

render();
</script>
</body>
