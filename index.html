<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Learn English</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f4f0;--s:#fff;--b:#e8e8e4;--t:#1a1a1a;--m:#999;--f:#f0f0ec;--a:#1a1a1a;--g:#4caf50;--bl:#3b6fd4;--or:#e07b39;--re:#e53935;--pu:#7c4dff}
.dk{--bg:#111;--s:#1c1c1f;--b:#2a2a2e;--t:#f0f0ed;--m:#666;--f:#222226;--a:#f0f0ed}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;transition:background .3s}
h1,h2,h3{font-family:'Playfair Display',serif}
button{cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s}
input,textarea,select{font-family:'DM Sans',sans-serif;background:var(--f);color:var(--t);border:1px solid var(--b);border-radius:9px;padding:10px 14px;font-size:14px;outline:none;width:100%;transition:border .2s}
input:focus,textarea:focus{border-color:var(--bl)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--b);border-radius:4px}
.card{background:var(--s);border:1px solid var(--b);border-radius:16px;padding:20px}
.bp{background:var(--a);color:var(--bg);border:none;border-radius:9px;padding:11px 18px;font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:5px}
.bg{background:var(--f);color:var(--m);border:1px solid var(--b);border-radius:9px;padding:11px 18px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:5px}
.bs{background:#f0faf0;color:#2e7d32;border:1px solid #c8e6c9;border-radius:9px;padding:11px 18px;font-size:13px;cursor:pointer}
.bd{background:#fff5f5;color:#c62828;border:1px solid #fcd0d0;border-radius:9px;padding:11px 18px;font-size:13px;cursor:pointer}
.btn-full{width:100%;display:flex;justify-content:center}
.pbar{height:6px;background:var(--f);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .6s}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--s);border-top:1px solid var(--b);display:flex;z-index:100;max-width:480px;margin:0 auto}
.nit{flex:1;padding:10px 4px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;font-size:9px;color:var(--m);font-family:'DM Sans',sans-serif}
.nit.on{color:var(--a)}
#app{max-width:480px;margin:0 auto;padding:24px 16px 80px}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--s);border-radius:20px;padding:26px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.ob{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.sec{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--m);margin-bottom:12px}
.lbl{font-size:11px;color:var(--m);letter-spacing:.05em;display:block;margin-bottom:5px}
.opt{padding:13px 16px;border-radius:9px;text-align:left;font-size:14px;border:1px solid var(--b);background:var(--f);color:var(--t);width:100%;display:block;margin-bottom:9px;cursor:pointer;transition:all .2s}
.opt.ok{background:#f0faf0!important;border-color:#4caf50!important;color:#2e7d32!important}
.opt.no{background:#fff5f5!important;border-color:#f44336!important;color:#c62828!important}
.deck-check{display:flex;align-items:center;gap:12px;padding:14px 16px;border:2px solid var(--b);border-radius:12px;margin-bottom:10px;cursor:pointer;transition:all .2s;background:var(--s)}
.deck-check.selected{border-color:var(--bl);background:#e8eef8}
.deck-check.selected.dk{background:#1a2030}
.cbai{background:var(--f);border-radius:18px 18px 18px 4px;padding:11px 15px;max-width:85%;font-size:14px;line-height:1.6}
.cbme{background:var(--a);color:var(--bg);border-radius:18px 18px 4px 18px;padding:11px 15px;max-width:85%;font-size:14px;line-height:1.6}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.dl span{width:7px;height:7px;border-radius:50%;background:var(--m);display:inline-block;animation:bounce 1s infinite}
.dl span:nth-child(2){animation-delay:.15s}.dl span:nth-child(3){animation-delay:.3s}
.xpa{animation:fu 1.4s ease forwards;position:fixed;top:80px;right:20px;font-size:18px;font-weight:700;color:var(--g);pointer-events:none;z-index:300;font-family:'Playfair Display',serif}
.flip-card{min-height:200px;border-radius:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;transition:all .35s;border:1px solid var(--b)}
.tag{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;display:inline-block}
</style>
</head>
<body>
<div id="xpt"></div>
<div id="ob" class="ob" style="display:none"></div>
<div id="app" style="display:none"></div>
<nav class="bnav" id="bnav" style="display:none"></nav>
<script>
const LS={get:(k,d)=>{try{const v=localStorage.getItem('le_'+k);return v?JSON.parse(v):d}catch{return d}},set:(k,v)=>{try{localStorage.setItem('le_'+k,JSON.stringify(v))}catch{}}};
const uid=()=>'_'+Math.random().toString(36).slice(2,9);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const tts=(t,r=.9)=>{if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=r;window.speechSynthesis.speak(u)};
const today=()=>new Date().toDateString();
const shuffle=arr=>[...arr].sort(()=>Math.random()-.5);

const LVLS=[
  {l:'A1',min:0,label:'Débutant',c:'#4caf50'},
  {l:'A2',min:200,label:'Élémentaire',c:'#8bc34a'},
  {l:'B1',min:500,label:'Intermédiaire',c:'#3b6fd4'},
  {l:'B2',min:1100,label:'Indépendant',c:'#7c4dff'},
  {l:'C1',min:2200,label:'Avancé',c:'#e07b39'},
  {l:'C2',min:4000,label:'Maîtrise',c:'#e53935'},
];

const BADGES=[
  {id:'b1',i:'🎯',n:'Premier pas'},{id:'b2',i:'🔥',n:'En feu'},
  {id:'b3',i:'⭐',n:'100 XP'},{id:'b4',i:'🌟',n:'500 XP'},
  {id:'b5',i:'📚',n:'Deck terminé'},{id:'b6',i:'🏆',n:'Quiz parfait'},
  {id:'b7',i:'🎓',n:'Niveau testé'},{id:'b8',i:'👑',n:'Boss Round'},
  {id:'b9',i:'💯',n:'TOEIC 80%'},{id:'b10',i:'🔁',n:'SRS 7 jours'},
];

let S={
  tab:'home',dk:LS.get('dk',false),xp:LS.get('xp',0),
  streak:LS.get('streak',0),lastStudy:LS.get('ls',null),
  dailyP:LS.get('dp',0),dailyG:LS.get('dg',10),dailyD:LS.get('dd',null),
  userLvl:LS.get('ulvl',null),obDone:LS.get('ob',false),
  decks:LS.get('decks',[]),srs:LS.get('srs',{}),
  badges:LS.get('bdg',[]),errLog:LS.get('erl',[]),
  // Learn session
  selectedDecks:LS.get('selDecks',[]),
  cardCount:LS.get('cardCount',20),
  studyMode:'srs',
  session:null, // {cards,idx,correct,wrong,mode}
  // Exam
  ltData:null,toeicData:null,
  obStep:0,
};

if(S.dailyD!==today()){S.dailyP=0;S.dailyD=today();sv('dailyP');sv('dailyD');}

function sv(k){
  const m={xp:'xp',streak:'streak',lastStudy:'ls',dailyP:'dp',dailyG:'dg',dailyD:'dd',
    userLvl:'ulvl',obDone:'ob',decks:'decks',srs:'srs',badges:'bdg',errLog:'erl',
    selectedDecks:'selDecks',cardCount:'cardCount',dk:'dk'};
  if(m[k])LS.set(m[k],S[k]);
}

function getLvl(xp){let l=LVLS[0];for(const t of LVLS){if(xp>=t.min)l=t;}return l;}
function srsNext(c,ok){
  const now=Date.now(),i=c.srsInterval||1,e=c.srsEase||2.5;
  if(!ok)return{srsInterval:1,srsEase:Math.max(1.3,e-.2),srsNextReview:now+300000};
  const ni=Math.round(i*ease);
  return{srsInterval:ni,srsEase:Math.min(3,e+.1),srsNextReview:now+ni*86400000};
}
function srsNextFixed(cardSrs,ok){
  const now=Date.now(),i=cardSrs.srsInterval||1,e=cardSrs.srsEase||2.5;
  if(!ok)return{srsInterval:1,srsEase:Math.max(1.3,e-.2),srsNextReview:now+300000};
  const ni=Math.round(i*e);
  return{srsInterval:ni,srsEase:Math.min(3,e+.1),srsNextReview:now+ni*86400000};
}
function isDue(cardId){const s=S.srs[cardId];return!s?.srsNextReview||s.srsNextReview<=Date.now();}
function addXP(n){
  S.xp+=n;sv('xp');checkB();
  const el=document.createElement('div');el.className='xpa';el.textContent=`+${n} XP ⚡`;
  document.getElementById('xpt').innerHTML='';document.getElementById('xpt').appendChild(el);
  setTimeout(()=>el.remove(),1500);
}
function toast(msg,c='#4caf50'){
  const el=document.createElement('div');el.className='xpa';el.style.color=c;el.textContent=msg;
  document.getElementById('xpt').appendChild(el);setTimeout(()=>el.remove(),2500);
}
function earnB(id){if(S.badges.includes(id))return;S.badges.push(id);sv('badges');const b=BADGES.find(x=>x.id===id);if(b)toast(`${b.i} ${b.n}!`,'#e07b39');}
function checkB(){if(S.xp>=100)earnB('b3');if(S.xp>=500)earnB('b4');if(S.streak>=3)earnB('b2');}
function updStreak(){const t=today();if(S.lastStudy===t)return;const y=new Date(Date.now()-86400000).toDateString();S.streak=S.lastStudy===y?S.streak+1:1;S.lastStudy=t;sv('streak');sv('lastStudy');}
function incD(){S.dailyP++;sv('dailyP');if(S.dailyP===S.dailyG)toast('🎉 Objectif atteint !','#4caf50');}

function render(){
  if(S.dk)document.body.classList.add('dk');else document.body.classList.remove('dk');
  if(!S.obDone){renderOb();return;}
  document.getElementById('ob').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('bnav').style.display='flex';
  renderNav();
  const fns={home:rHome,decks:rDecks,learn:rLearn,exams:rExams};
  document.getElementById('app').innerHTML=rHeader()+'<div id="tc">'+(fns[S.tab]||rHome)()+'</div>';
}

function rHeader(){
  const lv=getLvl(S.xp),nx=LVLS.find(t=>t.min>S.xp),p=nx?Math.min(100,((S.xp-lv.min)/(nx.min-lv.min))*100):100;
  return`<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px">
    <div><div class="sec" style="margin:0 0 3px">Application</div><h1 style="font-size:26px;line-height:1.1">Learn English</h1></div>
    <button class="bg" onclick="toggleDk()" style="padding:8px 10px;font-size:16px">${S.dk?'☀️':'🌙'}</button>
  </div>
  <div style="display:flex;gap:10px;margin-bottom:20px">
    <div class="card" style="display:flex;align-items:center;gap:8px;padding:12px 14px;min-width:88px">
      <span style="font-size:22px">🔥</span>
      <div><div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;line-height:1">${S.streak}</div><div style="font-size:10px;color:var(--m)">streak</div></div>
    </div>
    <div class="card" style="flex:1">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:12px;font-weight:600;color:${lv.c}">${lv.l} · ${lv.label}</span>
        <span style="font-size:11px;color:var(--m)">${S.xp} XP</span>
      </div>
      <div class="pbar"><div class="pfill" style="width:${p}%;background:${lv.c}"></div></div>
      ${nx?`<div style="font-size:10px;color:var(--m);margin-top:4px">${nx.min-S.xp} XP → ${nx.l}</div>`:''}
    </div>
  </div>`;
}

function renderNav(){
  const tabs=[{id:'home',i:'🏠',l:'Accueil'},{id:'decks',i:'📦',l:'Decks'},{id:'learn',i:'✏️',l:'Apprendre'},{id:'exams',i:'🎓',l:'Examens'}];
  document.getElementById('bnav').innerHTML=tabs.map(t=>`<button class="nit ${S.tab===t.id?'on':''}" onclick="setTab('${t.id}')"><span style="font-size:20px">${t.i}</span><span>${t.l}</span></button>`).join('');
}
function rHome(){
  const mastered=Object.values(S.srs).filter(x=>x.srsInterval>=7).length;
  const allCards=S.decks.flatMap(d=>d.cards);
  const due=allCards.filter(c=>isDue(c.id)).length;
  const total=allCards.length;
  const pct=S.dailyG?Math.min(100,(S.dailyP/S.dailyG)*100):0;
  return`
  <div class="card" style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-weight:600;font-size:15px">Objectif du jour</div>
      <span style="font-size:13px;color:${S.dailyP>=S.dailyG?'var(--g)':'var(--m)'};font-weight:600">${S.dailyP}/${S.dailyG}</span>
    </div>
    <div class="pbar"><div class="pfill" style="width:${pct}%;background:${S.dailyP>=S.dailyG?'var(--g)':'var(--bl)'}"></div></div>
    ${S.dailyP>=S.dailyG?'<div style="font-size:12px;color:var(--g);margin-top:6px">🎉 Objectif atteint !</div>':''}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
    ${[['📦',S.decks.length,'Decks'],['📇',total,'Cartes'],['🕐',due,'À revoir']].map(([i,v,l])=>`
    <div class="card" style="text-align:center;padding:14px 8px">
      <div style="font-size:22px;margin-bottom:4px">${i}</div>
      <div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:700">${v}</div>
      <div style="font-size:10px;color:var(--m)">${l}</div>
    </div>`).join('')}
  </div>
  <div class="card" style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h3 style="font-size:15px">Progression SRS</h3>
      <span style="font-size:12px;color:var(--m)">${mastered}/${total} maîtrisées</span>
    </div>
    <div class="pbar" style="height:10px"><div class="pfill" style="width:${total?Math.round((mastered/total)*100):0}%;background:var(--g)"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--m)">
      <span>🔴 À revoir : ${due}</span>
      <span>🟡 En cours : ${total-mastered-due}</span>
      <span>🟢 Maîtrisées : ${mastered}</span>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
    <button class="bp" onclick="setTab('learn')" style="padding:16px;flex-direction:column;gap:6px;border-radius:14px">
      <span style="font-size:28px">✏️</span>
      <span style="font-size:13px">Apprendre</span>
    </button>
    <button class="bg" onclick="setTab('exams')" style="padding:16px;flex-direction:column;gap:6px;border-radius:14px;justify-content:center">
      <span style="font-size:28px">🎓</span>
      <span style="font-size:13px">Examens</span>
    </button>
  </div>
  <div class="card">
    <h3 style="font-size:14px;margin-bottom:14px">Badges ${S.badges.length}/${BADGES.length}</h3>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">
      ${BADGES.map(b=>`<div title="${b.n}" style="text-align:center;padding:8px 4px;border-radius:9px;background:${S.badges.includes(b.id)?'var(--f)':'transparent'};opacity:${S.badges.includes(b.id)?1:.2}">
        <div style="font-size:22px">${b.i}</div>
        <div style="font-size:8px;color:var(--m);margin-top:3px;line-height:1.2">${b.n}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function rDecks(){
  return`
  <div style="display:flex;gap:7px;margin-bottom:16px">
    <button class="bp" onclick="showM('gen')" style="flex:1">✨ Générer IA</button>
    <button class="bg" onclick="showM('imp')" style="flex:1">↑ Importer</button>
    <button class="bg" onclick="showM('cdeck')" style="flex:1">+ Nouveau</button>
  </div>
  ${!S.decks.length?`<div style="text-align:center;padding:40px 20px;color:var(--m)">
    <div style="font-size:48px;margin-bottom:12px">📦</div>
    <div style="font-size:15px;font-family:'Playfair Display',serif;margin-bottom:8px">Aucun deck</div>
    <div style="font-size:13px">Importe ou génère ton premier deck !</div>
  </div>`:''}
  ${S.decks.map((dk,di)=>{
    const mastered=dk.cards.filter(c=>S.srs[c.id]?.srsInterval>=7).length;
    const due=dk.cards.filter(c=>isDue(c.id)).length;
    const pct=dk.cards.length?Math.round((mastered/dk.cards.length)*100):0;
    return`<div style="border:1px solid var(--b);border-radius:14px;overflow:hidden;margin-bottom:11px">
      <div style="padding:16px 18px;background:${dk.color||'var(--f)'};cursor:pointer" onclick="tog('db-${dk.id}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="flex:1">
            <div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:6px">${esc(dk.name)}</div>
            <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap">
              <span style="font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(0,0,0,.1);color:#333;font-weight:600">${dk.cards.length} cartes</span>
              ${due>0?`<span style="font-size:10px;padding:2px 7px;background:#fff3e0;color:#e65100;border-radius:20px">🕐 ${due} dues</span>`:''}
              <span style="font-size:10px;padding:2px 7px;background:#f0faf0;color:#2e7d32;border-radius:20px">✓ ${pct}%</span>
            </div>
          </div>
          <button onclick="event.stopPropagation();delDk('${dk.id}')" style="background:rgba(0,0,0,.1);border:none;border-radius:7px;padding:6px 9px;font-size:12px;cursor:pointer;color:#333;margin-left:8px">🗑</button>
        </div>
        <div class="pbar" style="margin-top:10px;height:4px"><div class="pfill" style="width:${pct}%;background:${dk.accent||'#4caf50'}"></div></div>
      </div>
      <div id="db-${dk.id}" style="display:none;background:var(--s);padding:14px 18px;border-top:1px solid var(--b)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="font-size:12px;color:var(--m)">${mastered}/${dk.cards.length} maîtrisées</span>
          <button class="bp" onclick="showM('acard','${dk.id}')" style="padding:6px 11px;font-size:11px">+ Carte</button>
        </div>
        <div style="max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:7px">
          ${!dk.cards.length?'<div style="color:var(--m);text-align:center;padding:12px;font-size:13px">Aucune carte. Ajoutes-en une !</div>':''}
          ${dk.cards.slice(0,50).map(c=>{
            const srs=S.srs[c.id];const d=isDue(c.id);
            return`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:var(--f);border-radius:8px">
              <div><span style="font-family:'Playfair Display',serif;font-size:14px;font-weight:600">${esc(c.word)}</span><span style="font-size:12px;color:var(--m);margin-left:8px">${esc(c.tr)}</span></div>
              <div style="display:flex;align-items:center;gap:6px">
                ${srs?.srsInterval>=7?'<span style="font-size:11px;color:var(--g)">✓</span>':(d?'<span style="width:7px;height:7px;border-radius:50%;background:#ff9800;display:inline-block"></span>':'')}
                <button onclick="delC('${dk.id}','${c.id}')" style="background:none;border:none;color:var(--b);font-size:14px;padding:2px 4px;cursor:pointer">✕</button>
              </div>
            </div>`;}).join('')}
          ${dk.cards.length>50?`<div style="text-align:center;font-size:12px;color:var(--m);padding:8px">... et ${dk.cards.length-50} autres cartes</div>`:''}
        </div>
      </div>
    </div>`;}).join('')}`;
}

function rLearn(){
  if(S.session)return rSession();
  const allCards=S.decks.flatMap(d=>d.cards);
  const due=allCards.filter(c=>isDue(c.id)).length;
  return`
  <div style="margin-bottom:20px">
    <h2 style="font-size:20px;margin-bottom:6px">Sélectionne tes decks</h2>
    <div style="font-size:13px;color:var(--m)">Coche les decks à étudier</div>
  </div>
  ${!S.decks.length?`<div style="text-align:center;padding:32px 20px;color:var(--m)">
    <div style="font-size:40px;margin-bottom:10px">📦</div>
    <div style="font-size:14px">Aucun deck disponible.</div>
    <button class="bp" onclick="setTab('decks')" style="margin-top:14px">Importer un deck</button>
  </div>`:`
  <div style="margin-bottom:16px">
    ${S.decks.map(dk=>{
      const sel=S.selectedDecks.includes(dk.id);
      const dkDue=dk.cards.filter(c=>isDue(c.id)).length;
      return`<div class="deck-check ${sel?'selected':''}" onclick="toggleDeckSel('${dk.id}')">
        <div style="width:22px;height:22px;border-radius:6px;border:2px solid ${sel?'var(--bl)':'var(--b)'};background:${sel?'var(--bl)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s">
          ${sel?'<span style="color:#fff;font-size:13px">✓</span>':''}
        </div>
        <div style="flex:1">
          <div style="font-family:'Playfair Display',serif;font-size:15px;font-weight:600">${esc(dk.name)}</div>
          <div style="font-size:12px;color:var(--m);margin-top:2px">${dk.cards.length} cartes · ${dkDue} dues SRS</div>
        </div>
      </div>`;}).join('')}
  </div>
  <div class="card" style="margin-bottom:16px">
    <div style="font-weight:600;font-size:14px;margin-bottom:14px">⚙️ Paramètres de session</div>
    <div style="margin-bottom:14px">
      <div class="lbl">Nombre de cartes</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap">
        ${[10,20,30,50,100,'Tout'].map(n=>`<button class="${(n==='Tout'?S.cardCount===99999:S.cardCount===n)?'bp':'bg'}" onclick="S.cardCount=${n==='Tout'?99999:n};sv('cardCount');render()" style="padding:8px 14px;font-size:13px">${n}</button>`).join('')}
      </div>
    </div>
    <div>
      <div class="lbl">Mode d'apprentissage</div>
      <div style="display:flex;gap:7px">
        <button class="${S.studyMode==='srs'?'bp':'bg'}" onclick="S.studyMode='srs';render()" style="flex:1;padding:10px;font-size:12px;flex-direction:column;gap:3px">
          <span style="font-size:16px">🧠</span><span>SRS Intelligent</span>
        </button>
        <button class="${S.studyMode==='random'?'bp':'bg'}" onclick="S.studyMode='random';render()" style="flex:1;padding:10px;font-size:12px;flex-direction:column;gap:3px">
          <span style="font-size:16px">🎲</span><span>Aléatoire</span>
        </button>
        <button class="${S.studyMode==='qcm'?'bp':'bg'}" onclick="S.studyMode='qcm';render()" style="flex:1;padding:10px;font-size:12px;flex-direction:column;gap:3px">
          <span style="font-size:16px">🔤</span><span>QCM</span>
        </button>
      </div>
    </div>
  </div>
  ${S.selectedDecks.length>0?`
  <div style="padding:12px 16px;background:var(--f);border-radius:10px;margin-bottom:14px;font-size:13px;color:var(--m)">
    ${S.selectedDecks.length} deck(s) · ${S.decks.filter(d=>S.selectedDecks.includes(d.id)).flatMap(d=>d.cards).length} cartes disponibles
    ${S.studyMode==='srs'?` · ${S.decks.filter(d=>S.selectedDecks.includes(d.id)).flatMap(d=>d.cards).filter(c=>isDue(c.id)).length} dues`:''}
  </div>`:''}
  <button class="bp btn-full" onclick="startSession()" ${!S.selectedDecks.length?'disabled':''} style="padding:16px;font-size:15px;border-radius:12px;opacity:${S.selectedDecks.length?1:.4}">
    🚀 Lancer la session
  </button>`}`;
}
function startSession(){
  if(!S.selectedDecks.length)return;
  let cards=S.decks.filter(d=>S.selectedDecks.includes(d.id)).flatMap(d=>d.cards.map(c=>({...c,deckName:d.name})));
  if(S.studyMode==='srs'){
    const due=cards.filter(c=>isDue(c.id));
    if(!due.length){toast('✓ Toutes les cartes sont à jour !','#4caf50');return;}
    cards=due;
  }
  cards=shuffle(cards);
  if(S.cardCount!==99999)cards=cards.slice(0,S.cardCount);
  if(!cards.length){toast('Aucune carte à étudier !','#e07b39');return;}
  S.session={cards,idx:0,correct:0,wrong:0,mode:S.studyMode,flipped:false,qopts:null,fillRes:null};
  updStreak();earnB('b1');render();
}

function rSession(){
  const sess=S.session;
  const idx=sess.idx,card=sess.cards[idx];
  if(!card)return rSessionEnd();
  const prog=Math.round((idx/sess.cards.length)*100);
  const md=sess.mode==='qcm'?'qcm':sess.mode==='fill'?'fill':'flip';
  let cnt='';

  if(md==='flip'){
    const fl=sess.flipped;
    cnt=`<div class="flip-card" style="background:${fl?'var(--a)':'var(--f)'};color:${fl?'var(--bg)':'var(--t)'}" onclick="sessFlip()">
      ${!fl?`<div style="text-align:center">
        <div class="sec">Anglais · ${esc(card.deckName||'')}</div>
        <div style="font-family:'Playfair Display',serif;font-size:38px;font-weight:700;margin-bottom:10px">${esc(card.word)}</div>
        <div style="font-size:12px;color:var(--m)">Toucher pour révéler</div>
      </div>`:`<div style="text-align:center">
        <div class="sec" style="color:var(--m)">Traduction</div>
        <div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:12px">${esc(card.tr)}</div>
        <div style="font-size:13px;font-style:italic;color:${fl?'#aaa':'var(--m)'};border-top:1px solid ${fl?'#333':'var(--b)'};padding-top:12px">"${esc(card.ex||'')}"</div>
      </div>`}
    </div>
    <div style="display:flex;gap:8px;margin:12px 0">
      <button class="bg" onclick="tts('${esc(card.word)}')" style="flex:1;padding:10px">🔊 Écouter</button>
    </div>
    ${fl?`<div style="display:flex;gap:9px">
      <button class="bd" onclick="sessAns(false)" style="flex:1;padding:14px;font-size:14px">😕 À revoir</button>
      <button class="bs" onclick="sessAns(true)" style="flex:1;padding:14px;font-size:14px">✓ Je savais !</button>
    </div>`:`<button class="bp btn-full" onclick="sessFlip()" style="padding:14px">Retourner la carte</button>`}`;
  }

  else if(md==='qcm'){
    const opts=sess.qopts||genQCM(card);if(!sess.qopts)sess.qopts=opts;
    cnt=`<div class="card" style="text-align:center;margin-bottom:16px;padding:28px">
      <div class="sec">${esc(card.deckName||'')}</div>
      <div style="font-family:'Playfair Display',serif;font-size:36px;font-weight:700;margin-bottom:12px">${esc(card.word)}</div>
      <button class="bg" onclick="tts('${esc(card.word)}')" style="padding:8px 16px;font-size:12px">🔊 Écouter</button>
    </div>
    <div id="qopts">${opts.map(o=>`<button class="opt" onclick="sessQCM('${esc(o)}')">${esc(o)}</button>`).join('')}</div>`;
  }

  else{
    cnt=`<div class="card" style="margin-bottom:14px;padding:24px;text-align:center">
      <div class="sec">${esc(card.deckName||'')}</div>
      <div style="font-family:'Playfair Display',serif;font-size:36px;font-weight:700;margin-bottom:8px">${esc(card.word)}</div>
      <button class="bg" onclick="tts('${esc(card.word)}')" style="padding:8px 16px;font-size:12px">🔊 Écouter</button>
    </div>
    <input id="finp" placeholder="Tape la traduction en français..." onkeydown="if(event.key==='Enter')sessFill()" style="margin-bottom:10px">
    <div id="fr"></div>
    <button class="bp btn-full" onclick="sessFill()" id="fbtn" style="padding:14px">Vérifier</button>`;
  }

  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <button class="bg" onclick="endSession()" style="padding:7px 12px;font-size:12px">✕ Quitter</button>
    <div style="text-align:center">
      <div style="font-size:12px;color:var(--m)">${idx+1} / ${sess.cards.length}</div>
      <div style="font-size:11px;color:var(--m)">✓${sess.correct} ✗${sess.wrong}</div>
    </div>
    <div style="display:flex;gap:5px">
      ${['flip','qcm'].map(m=>`<button class="${sess.mode===m?'bp':'bg'}" onclick="sess.mode='${m}';sess.flipped=false;sess.qopts=null;render()" style="padding:6px 10px;font-size:11px">${m==='flip'?'Carte':'QCM'}</button>`).join('')}
    </div>
  </div>
  <div class="pbar" style="margin-bottom:16px"><div class="pfill" style="width:${prog}%;background:var(--bl)"></div></div>
  ${cnt}`;
}

function rSessionEnd(){
  const sess=S.session;
  const total=sess.correct+sess.wrong;
  const pct=total?Math.round((sess.correct/total)*100):0;
  earnB('b5');
  if(pct>=80)earnB('b10');
  return`<div style="text-align:center;padding:32px 0">
    <div style="font-size:56px;margin-bottom:14px">${pct>=80?'🏆':pct>=60?'👍':'💪'}</div>
    <h2 style="font-size:28px;margin-bottom:8px">${sess.correct}/${total}</h2>
    <div style="font-size:15px;color:var(--m);margin-bottom:6px">${pct}% de bonnes réponses</div>
    <div style="font-size:13px;color:var(--m);margin-bottom:28px">${pct>=80?'Excellent travail !':pct>=60?'Bien joué !':'Continue à pratiquer !'}</div>
    <div style="display:flex;gap:10px;margin-bottom:12px">
      <button class="bp" onclick="restartSession()" style="flex:1;padding:14px">🔁 Recommencer</button>
      <button class="bg" onclick="endSession()" style="flex:1;padding:14px">Retour</button>
    </div>
    ${sess.wrong>0?`<button class="bg btn-full" onclick="reviewWrong()" style="padding:14px;margin-top:4px">😕 Réviser les ${sess.wrong} erreurs</button>`:''}
  </div>`;
}

function sessFlip(){S.session.flipped=!S.session.flipped;render();}

function sessAns(ok){
  const card=S.session.cards[S.session.idx];
  const srs=srsNextFixed(S.srs[card.id]||{},ok);
  S.srs[card.id]=srs;sv('srs');
  if(ok){S.session.correct++;addXP(10);}else{S.session.wrong++;addXP(2);}
  incD();S.session.idx++;S.session.flipped=false;S.session.qopts=null;render();
}

function sessQCM(opt){
  const card=S.session.cards[S.session.idx];const ok=opt===card.tr;
  document.querySelectorAll('.opt').forEach(b=>{
    if(b.textContent.trim()===card.tr)b.classList.add('ok');
    else if(b.textContent.trim()===opt&&!ok)b.classList.add('no');
    b.disabled=true;
  });
  const srs=srsNextFixed(S.srs[card.id]||{},ok);S.srs[card.id]=srs;sv('srs');
  if(ok){S.session.correct++;addXP(12);}else{S.session.wrong++;addXP(2);}
  incD();
  setTimeout(()=>{S.session.idx++;S.session.qopts=null;render();},1000);
}

function sessFill(){
  const inp=document.getElementById('finp');if(!inp)return;
  const card=S.session.cards[S.session.idx];
  const ans=inp.value.trim().toLowerCase(),cor=card.tr.toLowerCase();
  const ok=ans===cor||cor.includes(ans)||ans.includes(cor.split('/')[0].trim().toLowerCase());
  inp.style.borderColor=ok?'#4caf50':'#f44336';inp.disabled=true;
  const res=document.getElementById('fr');
  if(res)res.innerHTML=`<div style="padding:12px;background:${ok?'#f0faf0':'#fff5f5'};border-radius:9px;font-size:14px;color:${ok?'#2e7d32':'#c62828'};margin-bottom:10px">${ok?'✓ Correct !':'✗ '+esc(card.tr)}<button class="bp" onclick="sessNext(${ok})" style="display:block;margin-top:10px;width:100%">Suivant →</button></div>`;
  const srs=srsNextFixed(S.srs[card.id]||{},ok);S.srs[card.id]=srs;sv('srs');
  if(ok){S.session.correct++;addXP(15);}else{S.session.wrong++;addXP(2);}
  incD();const fb=document.getElementById('fbtn');if(fb)fb.style.display='none';
}

function sessNext(ok){S.session.idx++;S.session.qopts=null;render();}

function endSession(){S.session=null;render();}

function restartSession(){
  const cards=shuffle([...S.session.cards]);
  S.session={cards,idx:0,correct:0,wrong:0,mode:S.session.mode,flipped:false,qopts:null};render();
}

function reviewWrong(){
  const wrongCards=S.session.cards.filter((c,i)=>{
    return i<S.session.idx&&S.srs[c.id]?.srsInterval===1;
  });
  if(!wrongCards.length){toast('Aucune carte à réviser','#4caf50');return;}
  S.session={cards:shuffle(wrongCards),idx:0,correct:0,wrong:0,mode:S.session.mode,flipped:false,qopts:null};render();
}

function genQCM(card){
  const all=S.decks.flatMap(d=>d.cards);
  const oth=all.filter(x=>x.id!==card.id&&x.tr!==card.tr).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.tr);
  return shuffle([...oth,card.tr]);
}

function toggleDeckSel(id){
  if(S.selectedDecks.includes(id))S.selectedDecks=S.selectedDecks.filter(x=>x!==id);
  else S.selectedDecks.push(id);
  sv('selectedDecks');render();
}
