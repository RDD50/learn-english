name: learn_english
description: Learn English APK
publish_to: "none"

version: 1.0.5+6

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/web/index.html

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0B2A5B"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 24
